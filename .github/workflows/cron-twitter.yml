name: MU cron — Twitter auto-post (hourly)

# twitter_post.py pulls /api/admin/x_queue → posts up to 3 fresh MU drops to X
# → POSTs back to /api/admin/x_mark_posted. No-op if TWITTER_* secrets are
# missing (exits 0 cleanly).
#
# Required secrets:
#   MU_ADMIN_TOKEN
#   TWITTER_API_KEY
#   TWITTER_API_SECRET
#   TWITTER_ACCESS_TOKEN
#   TWITTER_ACCESS_TOKEN_SECRET

on:
  schedule:
    - cron: '25 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      MU_STORE_URL: https://wearmu.com
      MU_ADMIN_TOKEN: ${{ secrets.MU_ADMIN_TOKEN }}
      TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
      TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
      TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
      TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
      X_POST_LIMIT: "3"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
      - name: Install deps
        run: pip install --quiet tweepy requests Pillow
      - name: Post fresh drops to X
        run: python twitter_post.py
