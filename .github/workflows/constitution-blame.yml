name: constitution blame → JSON

# Runs on every push that touches the Constitution OR the generator
# script. Re-runs `git blame --line-porcelain` and opens a PR updating
# `store/static/constitution_blame.json` (branch protection requires
# PRs on main, so the bot can no longer push directly — GH006).
#
# The PR is NOT auto-merged: a human merges it. The bot reuses a fixed
# branch (`bot/constitution-blame`), so repeated runs update the same
# open PR instead of piling up new ones.
#
# Constitution §23 — constitution_blame.json is the single source of
# truth for DAO authorship weight (mounted into main.rs via include_str!
# at build time). This action ensures every Constitution edit promptly
# proposes the matching DAO-weight update.

on:
  push:
    branches: [main]
    paths:
      - 'store/static/constitution.md'
      - 'scripts/gen_constitution_blame.py'
      - '.github/workflows/constitution-blame.yml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  BOT_BRANCH: bot/constitution-blame

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history needed for accurate git blame
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Regenerate blame JSON
        run: python3 scripts/gen_constitution_blame.py
      - name: Open / update PR if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet store/static/constitution_blame.json; then
            echo "no changes — skipping PR"
            exit 0
          fi
          git config user.name  "mu-blame-bot"
          git config user.email "bot@wearmu.com"
          git checkout -B "$BOT_BRANCH"
          git add store/static/constitution_blame.json
          git commit -m "chore(dao): regenerate constitution_blame.json [skip ci]"
          git push -f origin "$BOT_BRANCH"
          existing=$(gh pr list --head "$BOT_BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "PR #$existing already open — branch updated"
            gh pr comment "$existing" --body "🔄 regenerated from $GITHUB_SHA"
          else
            gh pr create \
              --head "$BOT_BRANCH" \
              --title "chore(dao): regenerate constitution_blame.json [skip ci]" \
              --body "Auto-generated by the constitution-blame workflow (run for $GITHUB_SHA).

          Constitution §23 — DAO authorship weight regenerated from \`git blame\` of \`store/static/constitution.md\`. Review and merge manually; the bot does not auto-merge."
          fi
