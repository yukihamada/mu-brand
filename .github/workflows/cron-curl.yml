name: MU cron — admin API triggers

# All curl-only crons. Hits public/admin endpoints on https://wearmu.com.
# GitHub schedules are best-effort (can be delayed up to 1h during high load),
# Fly's self-heal watcher (1h tokio task) catches misses.
#
# Required secret: MU_ADMIN_TOKEN

on:
  schedule:
    # Every 30 min — cv_pulse (modal/coupon/email subject auto-tuning)
    - cron: '*/30 * * * *'
    # (removed 2026-05-22) thank_buyers schedule — endpoint returns 410 (MUON
    # coupon discontinued 2026-05-16). Re-enable here when a no-coupon
    # thank-you flow ships.
    # Every 4h :20 — treasury snapshot (Solana + Stripe balance log)
    - cron: '20 */4 * * *'
    # Daily 00:00 UTC = JST 9:00 — /you backfill (today's design + email)
    - cron: '0 0 * * *'
    # Daily 00:05 — sample_grow (15 MUer get a fresh pick)
    - cron: '5 0 * * *'
    # Daily 00:10 UTC = JST 09:10 — blog_compose (canonical daily Field log)
    - cron: '10 0 * * *'
    # TEMP (2026-05-12 only): every 6h burst to validate post-incident.
    # Revert to daily-only on 2026-05-13 JST 10:00.
    - cron: '15 6,12,18 * * *'
    # Weekly Mon 00:00 — lottery draw
    - cron: '0 0 * * 1'
    # Weekly Mon 03:00 UTC = JST 12:00 — council_compose (議題自動生成)
    - cron: '0 3 * * 1'
    # Daily 02:00 UTC = JST 11:00 — ma_lottery_draw (server-side 100d idempotent)
    - cron: '0 2 * * *'
    # Daily 23:00 UTC = JST 08:00 — ma_retire_notify (100d expiry 7-day heads up)
    - cron: '0 23 * * *'
    # Every 6h :30 — konbini-reminder (poke buyers with unpaid Konbini sessions
    # before the 3-day expiry, two buckets: 24h-old and ~24h-before-expiry)
    - cron: '30 */6 * * *'
    # Hourly :25 — MUGEN auto-generate (Gemini 3 Pro Image → Printful → DB).
    # Watchdog on Fly alerts if no new MUGEN in 6h.
    - cron: '25 * * * *'
    # 6-hourly :40 — EN copy backfill for new SKUs (SEO: PDP ?lang=en body).
    - cron: '40 */6 * * *'
    # Every 5 min — external uptime watcher. Pings /healthz from outside Fly
    # so a Fly outage / DNS issue / panic-loop trips Telegram even when the
    # internal Fly watchdog is also down.
    - cron: '*/5 * * * *'
    # Every 6h :45 — off-Fly DB backup (VACUUM INTO → workflow artifact).
    # 2026-06-04: hourly → */6. The DB is 1.1GB (you_designs blobs 652MB +
    # products blobs 307MB); VACUUM INTO reads+writes ~2.2GB on a shared-cpu
    # machine, saturating disk I/O for ~60-90s — every request (incl.
    # /healthz) stalled and Fly briefly blackholed the site EVERY HOUR at
    # :45+GH-delay. 4 backups/day keeps DR (plus Fly daily volume snapshots)
    # at 1/6 the outage budget. Real fix = move blobs to R2 (approval needed).
    - cron: '45 1,7,13,19 * * *'
  workflow_dispatch:
    inputs:
      target:
        description: which job to run on demand
        type: choice
        options:
          - cv_pulse
          - treasury
          - you_backfill
          - sample_grow
          - blog_compose
          - lottery_draw
          - ma_lottery_draw
          - ma_retire_notify
          - council_compose
          - sample_grow_force
          - konbini_reminder
          - mugen_generate
          - uptime_ping
          - db_backup

permissions:
  contents: read

env:
  BASE_URL: https://wearmu.com
  MU_ADMIN_TOKEN: ${{ secrets.MU_ADMIN_TOKEN }}

jobs:
  cv_pulse:
    if: github.event.schedule == '*/30 * * * *' || github.event.inputs.target == 'cv_pulse'
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/admin/cv_pulse
        run: |
          # --retry-all-errors (2026-05-30): cv_pulse fires every 30 min so it
          # routinely overlaps a deploy and 500s; retry rides out the blip
          # instead of failing the run + alerting. The endpoint is idempotent
          # auto-tuning, so a retried POST is harmless.
          curl -fsS --retry 3 --retry-delay 5 --retry-all-errors \
            -X POST -H 'Content-Type: application/json' \
            -d "{\"admin_token\":\"${MU_ADMIN_TOKEN}\"}" \
            "${BASE_URL}/api/admin/cv_pulse" | head -c 1024

  # thank_buyers: removed 2026-05-22 — /api/admin/thank_buyers returns 410
  # (MUON coupon discontinued 2026-05-16). The handler is kept gated behind
  # admin_token for a future no-coupon flow; until then there is nothing for
  # the cron to do.


  treasury:
    if: github.event.schedule == '20 */4 * * *' || github.event.inputs.target == 'treasury'
    runs-on: ubuntu-latest
    steps:
      - name: GET /api/treasury (snapshot to log)
        run: curl -fsS "${BASE_URL}/api/treasury" | head -c 2048

  you_backfill:
    if: github.event.schedule == '0 0 * * *' || github.event.inputs.target == 'you_backfill'
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/you/admin/backfill_today
        run: |
          curl -fsS -X POST -H 'Content-Type: application/json' \
            -d "{\"admin_token\":\"${MU_ADMIN_TOKEN}\"}" \
            "${BASE_URL}/api/you/admin/backfill_today"

  sample_grow:
    if: github.event.schedule == '5 0 * * *' || github.event.inputs.target == 'sample_grow'
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/admin/sample_grow
        run: |
          curl -fsS -X POST -H 'Content-Type: application/json' \
            -d "{\"admin_token\":\"${MU_ADMIN_TOKEN}\"}" \
            "${BASE_URL}/api/admin/sample_grow"

  translate_en:
    if: github.event.schedule == '40 */6 * * *' || github.event.inputs.target == 'translate_en'
    runs-on: ubuntu-latest
    steps:
      - name: GET /admin/catalog/translate_en (EN copy for new SKUs)
        run: |
          for i in 1 2 3; do
            out=$(curl -fsS "${BASE_URL}/admin/catalog/translate_en?token=${MU_ADMIN_TOKEN}&limit=100")
            echo "$out"
            echo "$out" | grep -q '"remaining":0' && break
          done

  sample_grow_force:
    if: github.event.inputs.target == 'sample_grow_force'
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/admin/sample_grow?force=1
        run: |
          curl -fsS -X POST -H 'Content-Type: application/json' \
            -d "{\"admin_token\":\"${MU_ADMIN_TOKEN}\"}" \
            "${BASE_URL}/api/admin/sample_grow?force=1"

  # Autonomous daily blog — composed entirely on GitHub Actions.
  # Flow:
  #   1. GET /api/blog/stats_for_today (Fly) → {stats, today_slug, already_published, prompt, model}
  #   2. Short-circuit if already_published.
  #   3. POST prompt to Google Gemini directly with retry.
  #   4. POST result to /api/admin/blog_publish (Fly persists to SQLite).
  #   5. On any failure → Telegram alert.
  #
  # Required additional secrets:
  #   GEMINI_API_KEY      — Generative Language API key (separate from Fly's copy)
  #   TELEGRAM_BOT_TOKEN  — for the failure-alert step (optional but recommended)
  #
  # Fly's legacy /api/admin/blog_compose endpoint remains as a manual fallback
  # (trigger via the workflow_dispatch path on this job).
  blog_compose:
    # 6h burst is TEMP — auto-disables on 2026-05-13 01:00 UTC (JST 10:00).
    # The daily 10 0 * * * remains permanent. workflow_dispatch always allowed.
    if: |
      github.event.schedule == '10 0 * * *'
      || (github.event.schedule == '15 6,12,18 * * *' && github.run_started_at < '2026-05-13T01:00:00Z')
      || github.event.inputs.target == 'blog_compose'
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
    steps:
      - name: Fetch today's stats + prompt + backfill list
        id: stats
        run: |
          set -euo pipefail
          resp=$(curl -fsS --retry 3 --retry-delay 5 "${BASE_URL}/api/blog/stats_for_today")
          echo "$resp" > /tmp/stats.json
          jq -e .stats /tmp/stats.json > /dev/null
          already=$(jq -r .already_published /tmp/stats.json)
          base_slug=$(jq -r .today_slug /tmp/stats.json)
          backfill=$(jq -c '.backfill_slugs // []' /tmp/stats.json)
          # 6h burst mode: when triggered by the 6h schedule, use hour-suffixed
          # slug (auto-YYYY-MM-DD-HH) so multiple posts/day don't collide.
          # The daily 10 0 * * * cron continues to use the canonical slug.
          if [ "${{ github.event.schedule }}" = "15 6,12,18 * * *" ]; then
            hh=$(date -u +%H)
            slug="${base_slug}-${hh}utc"
            # for 6h burst the canonical "already" check doesn't apply; check the suffix.
            already=$(curl -s "${BASE_URL}/api/blog/auto" | jq -r --arg s "$slug" \
              '.posts | map(select(.slug==$s)) | length > 0')
            echo "6h burst — slug=$slug already=$already"
          else
            slug="$base_slug"
          fi
          echo "already=$already" >> "$GITHUB_OUTPUT"
          echo "slug=$slug"       >> "$GITHUB_OUTPUT"
          echo "backfill=$backfill" >> "$GITHUB_OUTPUT"
          echo "Fetched stats: slug=$slug already=$already backfill=$backfill"

      - name: Skip if already published
        if: steps.stats.outputs.already == 'true'
        run: echo "(${{ steps.stats.outputs.slug }}) already published — skipping."

      - name: Compose + publish today (Gemini + retry + audit)
        if: steps.stats.outputs.already != 'true'
        id: gen
        run: |
          set -euo pipefail
          : "${GEMINI_API_KEY:?GEMINI_API_KEY secret is required}"
          : "${MU_ADMIN_TOKEN:?MU_ADMIN_TOKEN secret is required}"
          prompt=$(jq -r .prompt /tmp/stats.json)
          model=$(jq -r .gemini_model /tmp/stats.json)
          stats=$(jq -c .stats /tmp/stats.json)
          slug="${{ steps.stats.outputs.slug }}"
          payload=$(jq -n --arg p "$prompt" '{contents:[{parts:[{text:$p}]}]}')
          retry_count=0
          for attempt in 1 2 3; do
            if curl -fsS --max-time 60 \
              -H 'Content-Type: application/json' \
              -d "$payload" \
              "https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${GEMINI_API_KEY}" \
              > /tmp/gemini.json; then
              break
            fi
            retry_count=$attempt
            backoff=$((attempt * 10))
            echo "Gemini attempt $attempt failed — sleeping ${backoff}s"
            sleep $backoff
          done
          jq -e '.candidates[0].content.parts[0].text' /tmp/gemini.json > /dev/null \
            || { echo "Gemini returned no text"; cat /tmp/gemini.json; exit 1; }
          text=$(jq -r '.candidates[0].content.parts[0].text' /tmp/gemini.json)
          first=$(printf '%s\n' "$text" | head -1)
          if [[ "$first" == \#\ * ]]; then
            title=$(printf '%s\n' "$first" | sed 's/^#\s*//')
            body_md=$(printf '%s\n' "$text" | tail -n +2 | sed -e '1{/^$/d;}')
          else
            title="今日の Field log"
            body_md="$text"
          fi
          printf '%s' "$body_md" > /tmp/body.md
          echo "Composed: title=$title body_bytes=$(wc -c < /tmp/body.md) retries=$retry_count"

          publish_payload=$(jq -n \
            --arg token "$MU_ADMIN_TOKEN" \
            --arg title "$title" \
            --rawfile body /tmp/body.md \
            --argjson stats "$stats" \
            --arg slug "$slug" \
            --arg model "$model" \
            --argjson retry $retry_count \
            '{admin_token:$token, title:$title, body_md:$body, model:($model+"-via-actions"),
              stats_used:$stats, slug:$slug, origin:"actions", retry_count:$retry}')
          resp=$(curl -fsS --retry 3 --retry-delay 5 -X POST \
            -H 'Content-Type: application/json' \
            -d "$publish_payload" \
            "${BASE_URL}/api/admin/blog_publish")
          echo "Publish response: $resp"
          jq -e '.ok == true' <<<"$resp" > /dev/null
          echo "title=$title" >> "$GITHUB_OUTPUT"

      # Backfill: if Actions missed yesterday/2-ago/3-ago, generate a brief
      # for each missing slug too. Idempotent on slug (server-side check).
      - name: Backfill missing days
        if: steps.stats.outputs.backfill != '[]' && steps.stats.outputs.backfill != ''
        env:
          BACKFILL_LIST: ${{ steps.stats.outputs.backfill }}
        run: |
          set -euo pipefail
          : "${GEMINI_API_KEY:?}"
          : "${MU_ADMIN_TOKEN:?}"
          stats=$(jq -c .stats /tmp/stats.json)
          prompt=$(jq -r .prompt /tmp/stats.json)
          model=$(jq -r .gemini_model /tmp/stats.json)
          for slug in $(jq -r '.[]' <<<"$BACKFILL_LIST"); do
            echo "Backfilling $slug..."
            payload=$(jq -n --arg p "$prompt" '{contents:[{parts:[{text:$p}]}]}')
            curl -fsS --max-time 60 -H 'Content-Type: application/json' -d "$payload" \
              "https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${GEMINI_API_KEY}" \
              > /tmp/gemini-bf.json
            text=$(jq -r '.candidates[0].content.parts[0].text // ""' /tmp/gemini-bf.json)
            [ -z "$text" ] && { echo "Empty Gemini text for $slug — skipping"; continue; }
            first=$(printf '%s\n' "$text" | head -1)
            if [[ "$first" == \#\ * ]]; then
              title=$(printf '%s\n' "$first" | sed 's/^#\s*//')
              body_md=$(printf '%s\n' "$text" | tail -n +2)
            else
              title="Field log ($slug)"; body_md="$text"
            fi
            printf '%s' "$body_md" > /tmp/body-bf.md
            bf_payload=$(jq -n \
              --arg token "$MU_ADMIN_TOKEN" --arg title "$title" \
              --rawfile body /tmp/body-bf.md --argjson stats "$stats" --arg slug "$slug" \
              --arg model "$model" \
              '{admin_token:$token, title:$title, body_md:$body, model:($model+"-via-actions"),
                stats_used:$stats, slug:$slug, origin:"actions-backfill", quiet:true}')
            curl -fsS -X POST -H 'Content-Type: application/json' \
              -d "$bf_payload" "${BASE_URL}/api/admin/blog_publish" || echo "Backfill $slug failed (non-fatal)"
            sleep 3  # space out Gemini calls
          done

      - name: Telegram alert on failure
        if: failure() && env.TELEGRAM_BOT_TOKEN != ''
        run: |
          set -e
          slug="${{ steps.stats.outputs.slug }}"
          msg="🚨 blog_compose (Actions) failed%0Aslug=${slug:-unknown}%0Arun=${{ github.run_id }}%0AURL=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -fsS -X POST \
            -d "chat_id=1136442501" \
            -d "text=${msg}" \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" || true

  lottery_draw:
    if: github.event.schedule == '0 0 * * 1' || github.event.inputs.target == 'lottery_draw'
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/admin/lottery_draw
        run: |
          curl -fsS -X POST -H 'Content-Type: application/json' \
            -d "{\"admin_token\":\"${MU_ADMIN_TOKEN}\"}" \
            "${BASE_URL}/api/admin/lottery_draw"

  ma_lottery_draw:
    # Daily check; server enforces 100-day idempotency. The endpoint refuses
    # to re-fire within LOTTERY_PERIOD_DAYS days unless kind='manual'.
    if: github.event.schedule == '0 2 * * *' || github.event.inputs.target == 'ma_lottery_draw'
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/admin/ma_lottery/draw (kind=100day)
        run: |
          set -euo pipefail
          resp=$(curl -fsS -X POST -H 'Content-Type: application/json' \
            -d "{\"admin_token\":\"${MU_ADMIN_TOKEN}\",\"kind\":\"100day\"}" \
            "${BASE_URL}/api/admin/ma_lottery/draw")
          echo "$resp"
          # If ok=true, send Telegram alert. If skipped (recent draw exists), stay quiet.
          ok=$(echo "$resp" | jq -r .ok 2>/dev/null || echo "false")
          if [ "$ok" = "true" ] && [ -n "${TELEGRAM_BOT_TOKEN:-}" ]; then
            # Privacy: only send pseudonym, never raw email.
            pseudonym=$(echo "$resp" | jq -r .winner_pseudonym)
            url=$(echo "$resp" | jq -r .action_url)
            curl -fsS -X POST \
              -d "chat_id=1136442501" \
              --data-urlencode "text=🎟 4/7 Founder Relay fired — ${pseudonym} · ${url}" \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" || true
          fi

  ma_retire_notify:
    # Daily JST 08:00 — for MA pieces hitting 100d expiry today (±1d window),
    # send the owner a "you can retire / or keep" reminder. Idempotent via
    # server-side NOTIFY:<jst-date> marker in retire_reason.
    if: github.event.schedule == '0 23 * * *' || github.event.inputs.target == 'ma_retire_notify'
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/admin/ma_retire/notify
        run: |
          set -euo pipefail
          resp=$(curl -fsS -X POST -H 'Content-Type: application/json' \
            -d "{\"admin_token\":\"${MU_ADMIN_TOKEN}\"}" \
            "${BASE_URL}/api/admin/ma_retire/notify")
          echo "$resp"

  council_compose:
    if: github.event.schedule == '0 3 * * 1' || github.event.inputs.target == 'council_compose'
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/admin/council_compose
        run: |
          curl -fsS -X POST -H 'Content-Type: application/json' \
            -d "{\"admin_token\":\"${MU_ADMIN_TOKEN}\"}" \
            "${BASE_URL}/api/admin/council_compose"

  konbini_reminder:
    # Every 6h :30 — finds open Konbini sessions and emails the buyer a
    # reminder. Two buckets (24h-old and ~24h-before-expiry), de-duped on
    # (session_id, bucket) so re-runs are safe.
    if: github.event.schedule == '30 */6 * * *' || github.event.inputs.target == 'konbini_reminder'
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/admin/cron/konbini-reminder
        run: |
          curl -fsS -X POST -H 'Content-Type: application/json' \
            -d "{\"admin_token\":\"${MU_ADMIN_TOKEN}\"}" \
            "${BASE_URL}/api/admin/cron/konbini-reminder"

  mugen_generate:
    # Hourly :25 — generate the next MUGEN drop with Gemini 3 Pro Image,
    # register on Printful, push to wearmu.com via /api/admin/import.
    # generate.py queries /api/admin/next_drop?brand=mugen for the safe
    # next drop_num (production DB authoritative), so the stateless GH
    # runner never collides. Failure here surfaces in the Fly watchdog
    # agent (alerts if no new MUGEN in 6h).
    if: github.event.schedule == '25 * * * *' || github.event.inputs.target == 'mugen_generate'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install deps
        run: pip install --quiet google-genai pillow requests numpy
      - name: Generate next MUGEN
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          PRINTFUL_API_KEY:   ${{ secrets.PRINTFUL_API_KEY }}
          MU_ADMIN_TOKEN:     ${{ secrets.MU_ADMIN_TOKEN }}
          HELIUS_API_KEY:     ${{ secrets.HELIUS_API_KEY }}
          MU_STORE_URL:       https://wearmu.com
        run: python3 generate.py mugen
      - name: Notify Telegram on failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TG_TOKEN" ] && [ -n "$TG_CHAT" ]; then
            curl -fsS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT}" \
              -d "text=⚠️ mugen_generate cron failed (${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}). Fly watchdog will alert again if this persists."
          fi

  uptime_ping:
    # Every 5 min — external uptime probe. Deep /healthz returns 503 when
    # any sub-check fails (scheduler stale, DB unwritable, disk full,
    # watchdog itself stale) → 3 retries → Telegram. The JSON body is
    # captured and forwarded to Telegram so we know WHICH check tripped.
    if: github.event.schedule == '*/5 * * * *' || github.event.inputs.target == 'uptime_ping'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Probe /healthz (3 retries)
        id: probe
        run: |
          set +e
          for i in 1 2 3; do
            code=$(curl -sS -o /tmp/body -w "%{http_code}" --max-time 12 "${BASE_URL}/healthz")
            if [ "$code" = "200" ]; then
              # Even with 200, double-check the sub-fields explicitly so
              # any false-positive (e.g. /healthz returns "ok" plain-text
              # from a stale binary) becomes visible.
              if grep -q '"ok":true' /tmp/body 2>/dev/null || ! grep -q '"ok":' /tmp/body 2>/dev/null; then
                echo "ok ($code)"
                exit 0
              fi
            fi
            echo "attempt $i: code=$code body=$(head -c 400 /tmp/body)"
            sleep 30
          done
          echo "FAIL last_code=$code"
          exit 1
      - name: Telegram alert on persistent failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TG_TOKEN" ] && [ -n "$TG_CHAT" ]; then
            body=$(head -c 800 /tmp/body 2>/dev/null || echo "(no body)")
            curl -fsS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT}" \
              --data-urlencode "text=🚨 wearmu.com /healthz DOWN — 3x retries failed. body=${body}  run=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          fi

  db_backup:
    # Every hour :45 — pull a consistent SQLite snapshot via VACUUM INTO and
    # upload as a 14-day-retained GitHub workflow artifact. Off-Fly backup
    # independent of Fly's daily volume snapshots. Restore: download
    # artifact, fly volume create + scp the file in.
    if: github.event.schedule == '45 1,7,13,19 * * *' || github.event.inputs.target == 'db_backup'
    runs-on: ubuntu-latest
    timeout-minutes: 24
    steps:
      - name: Download DB snapshot
        env:
          ADMIN_TOKEN: ${{ secrets.MU_ADMIN_TOKEN }}
        run: |
          ts=$(date -u +%Y%m%dT%H%M%SZ)
          # 2026-05-22: bump from 60s → 240s — DB > 200MB now and VACUUM INTO + HTTP
          # transfer was timing out at 60s.
          # 2026-05-30 (1): add --retry-all-errors to ride out transient 500s
          # during deploys/VACUUM contention.
          # 2026-05-30 (2): --max-time was 180s but the actual VACUUM INTO +
          # ~200MB stream off a small shared-CPU Fly machine runs at <1 MB/s,
          # so every attempt died at "(28) timed out after 180000 ms with
          # ~160MB received" → 3 retries each re-ran the expensive VACUUM from
          # scratch → 9-min timeout-minutes cap → job killed (conclusion
          # "cancelled", which failure() below did NOT alert on → silent DR
          # outage). Fix: one attempt with a 600s budget (enough for VACUUM +
          # full transfer even at 0.4 MB/s); --retry 1 only (a real 500 blip is
          # cheap to re-try, but a slow transfer must NOT re-VACUUM 3×);
          # timeout-minutes 24 covers worst case (600 + 30 + 600).
          # 2026-06-04: token moved from ?token= query to X-Admin-Token header —
          # query tokens were logged verbatim by the server's request tracing.
          curl -fsS --max-time 600 --retry 1 --retry-delay 30 --retry-all-errors \
            -H "X-Admin-Token: ${ADMIN_TOKEN}" \
            "${BASE_URL}/api/admin/db_backup" \
            -o "products_${ts}.db"
          ls -lh "products_${ts}.db"
          # Sanity: file should be a valid SQLite DB (header "SQLite format 3\000")
          head -c 16 "products_${ts}.db" | hexdump -C | head -1
          echo "DB_FILE=products_${ts}.db" >> $GITHUB_ENV
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.DB_FILE }}
          path: ${{ env.DB_FILE }}
          retention-days: 14
      - name: Telegram on failure
        # cancelled() too: a timeout-minutes kill reports as "cancelled", not
        # "failure" — without this the hourly DR backup could fail silently.
        if: failure() || cancelled()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TG_TOKEN" ] && [ -n "$TG_CHAT" ]; then
            curl -fsS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT}" \
              -d "text=⚠️ db_backup hourly snapshot failed. ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          fi
