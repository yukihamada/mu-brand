# Reviews to seed via POST /api/admin/reviews
#
# LEGIT-ONLY policy (fake reviews are a hard NO):
#   - Founder / team initial-usage notes from real wear (mark verified_purchase
#     only if the SKU was actually purchased through wearmu.com).
#   - Opt-in customer feedback from email / X DM / Telegram — the customer
#     must have explicitly agreed to be quoted (a screenshot of consent in
#     `tasks/review_consent/` is the bar).
#   - Verified press quotes (with the source URL recorded in `body` or a
#     trailing parenthetical).
#
# NEVER fabricate. Do not put a plausible-sounding review under a founder
# name "just to seed the corpus" — that is the exact SEO penalty case Google
# punishes (and the user explicitly disallows).
#
# Each entry:
#   - product_sku: serial_code from products.db (e.g. "MU-BJJ-13-TEE-WHITE-L")
#                  OR product_id integer (e.g. 123). The script resolves
#                  serial_code -> product_id via sqlite SELECT.
#     rating: 1..5  (integer)
#     body: actual review text (Japanese or English; keep it under ~400 chars)
#     reviewer_name: real person name, handle, or initials. Required.
#     verified_purchase: true / false  (true only if real wearmu order)
#     approved: true  (set false if you want it to land as pending moderation)
#
# Idempotency: the script skips any entry where (product_id, reviewer_name,
# rating) already exists, so re-running this file is safe.
#
# Usage:
#   python3 scripts/seed_reviews.py --dry-run         # default; prints plan
#   python3 scripts/seed_reviews.py --commit          # actually POSTs to prod
#   BASE_URL=http://127.0.0.1:8080 python3 scripts/seed_reviews.py --commit

reviews: []  # ← add legit entries here (see structure above)
