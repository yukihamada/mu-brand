<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" role="img" aria-label="NOJIMAHAL — mode-Y3 inspired sport line, by Shigeaki Nojima">
  <title>NOJIMAHAL</title>
  <desc>Black background, NOJIMAHAL set heavy condensed with a volt accent bar between NOJI and MAHAL — typographic mark inspired by Y-3 / Yohji Yamamoto × adidas.</desc>
  <rect width="600" height="200" fill="#0a0a0a"/>
  <!-- ◯ mark top-left (MU lineage) -->
  <g transform="translate(28,28)" fill="none" stroke="#cdfb01" stroke-width="1.6">
    <line x1="0" y1="6" x2="16" y2="6"/>
    <circle cx="22" cy="6" r="5"/>
    <line x1="28" y1="6" x2="44" y2="6"/>
  </g>
  <!-- Wordmark -->
  <text x="300" y="118" text-anchor="middle"
        font-family="Helvetica Neue, Arial Black, sans-serif"
        font-weight="900" font-size="72" letter-spacing="6" fill="#ffffff">NOJI<tspan fill="#cdfb01">/</tspan>MAHAL</text>
  <!-- Volt accent rule -->
  <rect x="206" y="138" width="188" height="3" fill="#cdfb01"/>
  <!-- Subline -->
  <text x="300" y="170" text-anchor="middle"
        font-family="Helvetica Neue, Arial, sans-serif"
        font-weight="700" font-size="11" letter-spacing="6" fill="#cdfb01">2026 · BY SHIGEAKI NOJIMA</text>
  <!-- Right-edge stamp -->
  <text x="572" y="178" text-anchor="end"
        font-family="Helvetica Neue, Arial, sans-serif"
        font-weight="700" font-size="9" letter-spacing="3" fill="rgba(255,255,255,0.35)">MU · ENABLER INC.</text>
</svg>
