<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MU · bids viewer</title>
<meta name="robots" content="noindex">
<style>
  :root { --bg:#0A0A0A; --fg:#F5F5F0; --mute:#888; --accent:#e6c449; --line:#1c1c1c; --green:#7be57b; --red:#ff4a3d; }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--fg); margin: 0; font-family: ui-monospace, "SF Mono", Menlo, "Helvetica Neue", Arial, sans-serif; line-height: 1.65; font-size: 13px; }
  header { padding: 18px 24px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  header h1 { font-size: 14px; letter-spacing: 0.4em; margin: 0; font-weight: 700; }
  header input { background: #0f0f0f; color: var(--fg); border: 1px solid var(--line); padding: 6px 12px; font-family: inherit; font-size: 13px; border-radius: 4px; width: 120px; }
  header button { background: var(--accent); color: var(--bg); border: 0; padding: 7px 16px; font-family: inherit; font-size: 11px; font-weight: 700; letter-spacing: 0.18em; cursor: pointer; border-radius: 4px; }
  .wrap { padding: 24px; max-width: 1100px; margin: 0 auto; }
  .summary { background: #0f0f0f; border: 1px solid var(--line); border-radius: 8px; padding: 18px 22px; margin-bottom: 24px; display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px; }
  .kpi .label { font-size: 10px; letter-spacing: 0.26em; color: var(--mute); text-transform: uppercase; margin-bottom: 4px; }
  .kpi .v { font-size: 18px; font-weight: 300; color: var(--fg); }
  table { width: 100%; border-collapse: collapse; background: #0c0c0c; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  th, td { padding: 9px 12px; text-align: left; border-bottom: 1px solid #161616; font-size: 12px; }
  th { font-size: 10px; color: var(--mute); letter-spacing: 0.22em; text-transform: uppercase; background: #0a0a0a; font-weight: 700; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  tr.top td { background: rgba(230,196,73,0.04); border-bottom-color: rgba(230,196,73,0.18); }
  tr.top td:first-child::before { content: "★  "; color: var(--accent); }
  tr:hover td { background: rgba(245,245,240,0.03); }
  tr.top:hover td { background: rgba(230,196,73,0.06); }
  .tag { display: inline-block; padding: 1px 8px; border-radius: 99px; font-size: 10px; letter-spacing: 0.12em; font-weight: 600; }
  .tag.ok { background: rgba(123,229,123,0.10); color: var(--green); border: 1px solid rgba(123,229,123,0.30); }
  .tag.no { background: rgba(255,74,61,0.10); color: var(--red); border: 1px solid rgba(255,74,61,0.30); }
  .tag.muted { background: #1a1a1a; color: var(--mute); }
  .tag.warn { background: rgba(230,196,73,0.10); color: var(--accent); border: 1px solid rgba(230,196,73,0.30); }
  .muted { color: var(--mute); }
  .err { color: var(--red); padding: 30px; text-align: center; }
  .loading { color: var(--mute); padding: 40px; text-align: center; }
  .pi { font-size: 10px; color: var(--mute); font-family: inherit; }
  .self-bid td { opacity: 0.55; }
  .self-bid td::after {}
</style>
</head>
<body>
<header>
  <h1>━◯━ MU · BIDS</h1>
  <span class="muted" style="font-size:11px">product_id</span>
  <input id="pid" value="" placeholder="11">
  <button onclick="load()">Load</button>
  <a href="/admin/db" class="muted" style="margin-left:auto;font-size:11px;letter-spacing:0.2em">← /admin/db</a>
</header>

<div class="wrap" id="content">
  <div class="loading" id="status">━◯━ product_id を入れて Load を押してください</div>
</div>

<script>
const url = new URL(window.location.href);
const tokFromUrl = url.searchParams.get('admin_token') || url.searchParams.get('token') || '';
const pidFromUrl = url.searchParams.get('product_id') || '11';
document.getElementById('pid').value = pidFromUrl;

async function load() {
  const pid = document.getElementById('pid').value.trim();
  if (!pid) return;
  const qs = '?product_id=' + encodeURIComponent(pid) + (tokFromUrl ? '&admin_token=' + encodeURIComponent(tokFromUrl) : '');
  const r = await fetch('/api/admin/bids' + qs, { credentials: 'include' });
  if (!r.ok) {
    document.getElementById('content').innerHTML = `<div class="err">HTTP ${r.status} — admin_token が要ります: /admin/bids?admin_token=…</div>`;
    return;
  }
  const d = await r.json();
  render(d);
}

function tagFor(status) {
  if (status === 'captured') return { klass: 'ok', label: 'captured' };
  if (status === 'authorized') return { klass: 'warn', label: 'authorized' };
  if (status === 'cancelled') return { klass: 'no', label: 'cancelled' };
  if (status === 'pending_legacy') return { klass: 'warn', label: 'pending_legacy' };
  if (status === 'pending') return { klass: 'muted', label: 'pending' };
  return { klass: 'muted', label: status || 'legacy' };
}

function render(d) {
  if (!d.bid_count) {
    document.getElementById('content').innerHTML = `
      <div class="summary">
        <div class="kpi"><div class="label">Product</div><div class="v">${d.product || '—'}</div></div>
        <div class="kpi"><div class="label">Bids</div><div class="v">0</div></div>
      </div>
      <div class="loading">この product にはまだ入札がありません。</div>`;
    return;
  }
  const top = d.bids[0];
  const captured = d.bids.find(b => b.auth_status === 'captured');
  const authorized = d.bids.filter(b => b.auth_status === 'authorized');
  const html = `
  <div class="summary">
    <div class="kpi"><div class="label">Product</div><div class="v">${d.product}</div></div>
    <div class="kpi"><div class="label">Current bid</div><div class="v">¥${d.current_bid.toLocaleString()}</div></div>
    <div class="kpi"><div class="label">Bid count</div><div class="v">${d.bid_count}</div></div>
    <div class="kpi"><div class="label">Auction end</div><div class="v" style="font-size:13px">${d.auction_end || '—'}</div></div>
    <div class="kpi"><div class="label">Captured</div><div class="v">${captured ? '✓ ¥' + captured.amount_jpy.toLocaleString() : '—'}</div></div>
    <div class="kpi"><div class="label">Authorized holds</div><div class="v">${authorized.length}</div></div>
  </div>
  <table>
    <thead><tr><th>#</th><th class="num">amount</th><th>email</th><th>status</th><th>created</th><th>Stripe PI</th></tr></thead>
    <tbody>
      ${d.bids.map((b, i) => {
        const tag = tagFor(b.auth_status);
        const isSelf = (b.email || '').toLowerCase().includes('yukihamada') || (b.email || '').toLowerCase().includes('test@');
        const cls = (i === 0 ? 'top' : '') + (isSelf ? ' self-bid' : '');
        const ts = b.created_at && /^\d+$/.test(b.created_at)
          ? new Date(parseInt(b.created_at) * 1000).toISOString().slice(0,19).replace('T',' ')
          : (b.created_at || '').slice(0, 19);
        return `<tr class="${cls}">
          <td><strong>#${b.id}</strong></td>
          <td class="num"><strong>¥${b.amount_jpy.toLocaleString()}</strong></td>
          <td>${b.email}${isSelf ? ' <span class="muted">(自己入札)</span>' : ''}</td>
          <td><span class="tag ${tag.klass}">${tag.label}</span></td>
          <td class="muted">${ts}</td>
          <td class="pi">${b.stripe_pi_id ? b.stripe_pi_id.slice(0, 24) + '…' : '—'}</td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>
  <p class="muted" style="margin-top:18px;font-size:11px;line-height:2">
    ★ = top bid · 自己入札 (yuki/test) は薄表示 · pre-auth 完了は <span class="tag warn">authorized</span> · 落札済みは <span class="tag ok">captured</span> · 取消は <span class="tag no">cancelled</span><br>
    settle: <code>POST /api/admin/ma/settle?product_id=${d.product_id}</code> · cancel: <code>POST /api/admin/ma/cancel_auction?product_id=${d.product_id}</code> · legacy settle: <code>POST /api/admin/ma/settle_legacy?product_id=${d.product_id}</code>
  </p>`;
  document.getElementById('content').innerHTML = html;
}

if (tokFromUrl || pidFromUrl !== '11') load();
</script>
</body>
</html>
