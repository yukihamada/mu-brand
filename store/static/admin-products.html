<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MU · Products</title>
<meta name="robots" content="noindex">
<style>
  :root { --bg:#0A0A0A; --fg:#F5F5F0; --mute:#888; --accent:#e6c449; --line:#1c1c1c; --green:#7be57b; --red:#ff4a3d; --card:#101010; }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--fg); margin: 0; font-family: ui-monospace, "SF Mono", Menlo, "Helvetica Neue", Arial, sans-serif; line-height: 1.55; font-size: 13px; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  header { padding: 18px 24px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; position: sticky; top: 0; background: var(--bg); z-index: 50; }
  header h1 { font-size: 14px; letter-spacing: 0.4em; margin: 0; font-weight: 700; }
  header .nav { color: var(--mute); font-size: 11px; letter-spacing: 0.16em; }
  header .nav a { margin-left: 14px; }
  .wrap { padding: 24px 24px 120px; max-width: 1640px; margin: 0 auto; }
  .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 18px; }
  .toolbar input, .toolbar select { background: #0f0f0f; border: 1px solid var(--line); color: var(--fg); padding: 9px 12px; font-family: inherit; font-size: 12px; border-radius: 4px; }
  .toolbar input.search { width: 280px; }
  .toolbar .grow { margin-left: auto; }
  .btn { background: #0f0f0f; border: 1px solid var(--line); color: var(--fg); padding: 9px 14px; font-family: inherit; font-size: 11px; border-radius: 4px; cursor: pointer; letter-spacing: 0.12em; text-transform: uppercase; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
  .btn.primary:hover { color: #000; opacity: 0.9; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-sm { padding: 5px 10px; font-size: 10px; letter-spacing: 0.08em; }
  .count { color: var(--mute); font-size: 11px; letter-spacing: 0.14em; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; cursor: pointer; transition: border-color 0.12s, transform 0.12s; }
  .card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .card .thumb { width: 100%; aspect-ratio: 1/1; background: #050505; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .card .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .card .thumb.placeholder { color: var(--mute); font-size: 10px; letter-spacing: 0.16em; }
  .card .meta { padding: 10px 12px 12px; }
  .card .row1 { display: flex; gap: 8px; justify-content: space-between; align-items: center; font-size: 11px; color: var(--mute); letter-spacing: 0.08em; margin-bottom: 4px; }
  .card .brand { color: var(--accent); font-weight: 600; }
  .card .name { color: var(--fg); font-size: 12px; line-height: 1.35; min-height: 32px; word-break: break-word; }
  .card .row2 { display: flex; gap: 8px; justify-content: space-between; align-items: center; font-size: 11px; margin-top: 6px; }
  .card .price { color: var(--fg); font-variant-numeric: tabular-nums; }
  .card .stock { color: var(--mute); font-size: 10px; }
  .card.inactive { opacity: 0.45; }
  .card.soldout .stock { color: var(--red); }

  .sentinel { padding: 30px; text-align: center; color: var(--mute); font-size: 11px; letter-spacing: 0.18em; }
  .err { color: var(--red); padding: 20px; text-align: center; }

  /* Modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.88); display: none; align-items: flex-start; justify-content: center; z-index: 1000; overflow-y: auto; padding: 40px 16px; }
  .modal-bg.open { display: flex; }
  .modal { background: #0c0c0c; border: 1px solid var(--line); border-radius: 12px; max-width: 1380px; width: 100%; padding: 28px; }
  .modal-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 22px; flex-wrap: wrap; }
  .modal-head h3 { margin: 0 0 4px; font-size: 16px; letter-spacing: 0.04em; }
  .modal-head .sub { color: var(--mute); font-size: 11px; letter-spacing: 0.10em; }
  .modal-head .close { cursor: pointer; color: var(--mute); padding: 6px 14px; border: 1px solid var(--line); border-radius: 4px; }
  .modal-head .close:hover { color: var(--fg); }

  .photos { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 26px; }
  .photo-section h4 { font-size: 10px; letter-spacing: 0.32em; color: var(--accent); text-transform: uppercase; margin: 0 0 10px; font-weight: 700; }
  .photo-frame { width: 100%; aspect-ratio: 1/1; background: #050505; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
  .photo-frame img { width: 100%; height: 100%; object-fit: contain; }
  .photo-frame .empty { color: var(--mute); font-size: 11px; letter-spacing: 0.14em; }
  .photo-url { font-size: 10px; word-break: break-all; color: var(--mute); margin-bottom: 6px; }
  .photo-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }

  .life-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .life-card { background: #0a0a0a; border: 1px solid var(--line); border-radius: 6px; padding: 8px; }
  .life-card .frame { aspect-ratio: 4/5; background: #050505; border-radius: 4px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .life-card .frame img { width: 100%; height: 100%; object-fit: cover; }
  .life-card .frame .empty { color: var(--mute); font-size: 10px; }

  .edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .edit-field { display: flex; flex-direction: column; gap: 6px; }
  .edit-field label { font-size: 10px; letter-spacing: 0.22em; color: var(--mute); text-transform: uppercase; }
  .edit-field input, .edit-field textarea { background: #050505; border: 1px solid var(--line); color: var(--fg); padding: 9px 11px; font-family: inherit; font-size: 12px; border-radius: 4px; resize: vertical; }
  .edit-field textarea { min-height: 110px; line-height: 1.6; }
  .edit-field.full { grid-column: 1 / -1; }
  .edit-actions { display: flex; gap: 10px; flex-wrap: wrap; padding-top: 14px; border-top: 1px solid var(--line); }
  .status-line { padding: 9px 14px; border-radius: 4px; margin-top: 12px; font-size: 11px; letter-spacing: 0.06em; }
  .status-line.info { background: rgba(230,196,73,0.08); color: var(--accent); }
  .status-line.ok { background: rgba(123,229,123,0.08); color: var(--green); }
  .status-line.err { background: rgba(255,74,61,0.08); color: var(--red); }

  /* New SKU panel — slide-down on click */
  .new-panel { background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 18px; margin-bottom: 20px; display: none; }
  .new-panel.open { display: block; }
  .new-panel h3 { margin: 0 0 14px; font-size: 12px; letter-spacing: 0.22em; color: var(--accent); }
</style>
</head>
<body>
<header>
  <h1>━◯━ MU · PRODUCTS</h1>
  <div class="nav">
    <a href="/admin/costs">costs</a>
    <a href="/admin/db">db overview</a>
    <a href="/admin/bids">bids</a>
  </div>
</header>

<div class="wrap">
  <div class="toolbar">
    <input class="search" id="search" placeholder="search by name / id / brand…" oninput="onFilterChange()">
    <select id="brand" onchange="onFilterChange()">
      <option value="">— all brands —</option>
    </select>
    <select id="state" onchange="onFilterChange()">
      <option value="">— all states —</option>
      <option value="active">active</option>
      <option value="inactive">inactive</option>
      <option value="soldout">sold out</option>
    </select>
    <button class="btn primary" onclick="openNewPanel()">+ NEW SKU</button>
    <span class="count grow" id="count">0 loaded</span>
  </div>

  <div class="new-panel" id="new-panel">
    <!-- STEP 1: input -->
    <div id="wiz-step1">
      <h3>━ NEW SKU · STEP 1 / 3 — テーマ入力</h3>
      <div class="edit-grid">
        <div class="edit-field">
          <label>brand</label>
          <input id="n-brand" value="mugen">
        </div>
        <div class="edit-field">
          <label>name (テーマ / 仮名)</label>
          <input id="n-name" placeholder="例: 静 #1003 / 雨脚 / 弟子屈の朝">
        </div>
        <div class="edit-field">
          <label>price (¥)</label>
          <input id="n-price" type="number" value="6800" oninput="updatePriceRecommendation()">
          <span id="n-price-hint" style="font-size:10px;color:var(--mute);letter-spacing:0.04em"></span>
        </div>
        <div class="edit-field">
          <label>cost (¥, 空 = ブランド default)</label>
          <input id="n-cost" type="number" placeholder="例: 3200" oninput="updatePriceRecommendation()">
        </div>
        <div class="edit-field">
          <label>inventory (1/1 なら 1)</label>
          <input id="n-inventory" type="number" value="1">
        </div>
        <div class="edit-field">
          <label>候補生成数</label>
          <select id="n-count">
            <option value="3" selected>3 (推奨)</option>
            <option value="4">4</option>
            <option value="6">6</option>
          </select>
        </div>
        <div class="edit-field full">
          <label>prompt — chest graphic description (Gemini に投げる)</label>
          <textarea id="n-prompt" placeholder="抽象ミニマル, 黒の墨で雨脚を描いた、左肩寄り..."></textarea>
        </div>
      </div>
      <div class="edit-actions">
        <button class="btn primary" onclick="genCandidates()">━◯━ 候補を Gemini で並列生成</button>
        <button class="btn" onclick="closeWizard()">cancel</button>
        <div id="new-status" class="status-line" style="display:none"></div>
      </div>
    </div>

    <!-- STEP 2: pick a candidate -->
    <div id="wiz-step2" style="display:none">
      <h3>━ NEW SKU · STEP 2 / 3 — 1 つピック</h3>
      <p class="sub" style="color:var(--mute);font-size:11px;letter-spacing:0.08em;margin:0 0 14px">気に入った 1 つをクリックして SKU 化。気に入らなければ ↩ 戻って prompt 調整 → 再生成。</p>
      <div id="cand-grid" class="grid" style="grid-template-columns:repeat(auto-fit,minmax(280px,1fr));margin-bottom:14px"></div>
      <div class="edit-actions">
        <button class="btn" onclick="backToStep1()">↩ もう一度生成</button>
        <button class="btn" onclick="closeWizard()">cancel</button>
        <div id="wiz2-status" class="status-line" style="display:none"></div>
      </div>
    </div>

    <!-- STEP 3: finalized -->
    <div id="wiz-step3" style="display:none">
      <h3>━ NEW SKU · STEP 3 / 3 — 公開完了 ✓</h3>
      <p style="color:var(--green);font-size:13px;margin:0 0 14px" id="wiz3-msg"></p>
      <p style="color:var(--mute);font-size:11px;letter-spacing:0.06em;margin:0 0 14px">着画 3 枚 + Printful 実物 mockup はバックグラウンドで生成中 (約 1〜3 分)。完成したら SKU 詳細で確認。</p>
      <div class="edit-actions">
        <button class="btn primary" onclick="closeWizard(); resetAndReload();">━ もう 1 件作る</button>
        <button class="btn" id="wiz3-open" onclick="">━ この SKU を開く</button>
      </div>
    </div>
  </div>

  <div id="grid" class="grid"></div>
  <div class="sentinel" id="sentinel">━◯━ loading…</div>
</div>

<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-body"></div>
</div>

<script>
const PER = 60;
let offset = 0;
let hasMore = true;
let loading = false;
let currentBrand = '';
let currentSearch = '';
let currentState = '';
let products = [];
let brandsLoaded = false;

function adminToken() {
  const u = new URL(window.location.href);
  return u.searchParams.get('admin_token') || u.searchParams.get('token') || '';
}
function withTok(url) {
  const t = adminToken();
  return t ? url + (url.includes('?') ? '&' : '?') + 'admin_token=' + encodeURIComponent(t) : url;
}
// Propagate admin_token to nav links on page load.
document.querySelectorAll('header .nav a').forEach(a => {
  const href = a.getAttribute('href');
  if (href && href.startsWith('/')) a.setAttribute('href', withTok(href));
});
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function thumbSrc(p) {
  return p.mockup_url || p.design_url || `/api/products/${p.id}/mockup.png`;
}

async function fetchPage() {
  if (loading || !hasMore) return;
  loading = true;
  document.getElementById('sentinel').textContent = '━◯━ loading…';
  const params = new URLSearchParams();
  params.set('offset', String(offset));
  params.set('limit', String(PER));
  params.set('no_summary', '1');
  if (currentBrand) params.set('brand', currentBrand);
  if (currentSearch) params.set('search', currentSearch);
  const url = withTok('/api/admin/products?' + params.toString());
  try {
    const r = await fetch(url, { credentials: 'include' });
    if (!r.ok) {
      document.getElementById('sentinel').innerHTML = `<span class="err">HTTP ${r.status} — admin_token クエリで再アクセス</span>`;
      loading = false; return;
    }
    const data = await r.json();
    const incoming = data.products || [];
    let filtered = incoming;
    if (currentState === 'active') filtered = filtered.filter(p => p.active === 1);
    else if (currentState === 'inactive') filtered = filtered.filter(p => p.active !== 1);
    else if (currentState === 'soldout') filtered = filtered.filter(p => p.sold >= p.inventory);
    products = products.concat(filtered);
    offset += incoming.length;
    hasMore = !!data.has_more;
    renderGridAppend(filtered);
    document.getElementById('count').textContent = products.length.toLocaleString() + ' loaded';
    document.getElementById('sentinel').textContent = hasMore ? '━ scroll for more ━' : '━◯━ end';
    if (!brandsLoaded && Array.isArray(data.brands)) {
      brandsLoaded = true;
      const sel = document.getElementById('brand');
      while (sel.options.length > 1) sel.remove(1);
      data.brands.forEach(b => {
        const o = document.createElement('option');
        o.value = b; o.textContent = b; sel.appendChild(o);
      });
    }
  } catch (e) {
    document.getElementById('sentinel').innerHTML = `<span class="err">${escapeHtml(String(e))}</span>`;
  } finally { loading = false; }
}

function renderGridAppend(rows) {
  const grid = document.getElementById('grid');
  for (const p of rows) {
    const el = document.createElement('div');
    const stock = Math.max(0, p.inventory - p.sold);
    let cls = 'card';
    if (p.active !== 1) cls += ' inactive';
    if (stock === 0 && p.inventory > 0) cls += ' soldout';
    el.className = cls;
    el.onclick = () => openDetail(p.id);
    el.innerHTML = `
      <div class="thumb">
        <img src="${escapeHtml(thumbSrc(p))}" loading="lazy" alt="${escapeHtml(p.name)}" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'thumb placeholder',textContent:'no image'}))">
      </div>
      <div class="meta">
        <div class="row1"><span class="brand">${escapeHtml(p.brand)}</span><span>#${p.drop_num} · id ${p.id}</span></div>
        <div class="name">${escapeHtml(p.name || '—')}</div>
        <div class="row2">
          <span class="price">¥${p.price_jpy.toLocaleString()}</span>
          <span class="stock">${p.sold}/${p.inventory}</span>
        </div>
      </div>`;
    grid.appendChild(el);
  }
}

function resetAndReload() {
  offset = 0; hasMore = true; products = [];
  document.getElementById('grid').innerHTML = '';
  document.getElementById('count').textContent = '0 loaded';
  fetchPage();
}
function onFilterChange() {
  currentBrand = document.getElementById('brand').value;
  currentState = document.getElementById('state').value;
  currentSearch = document.getElementById('search').value.trim();
  resetAndReload();
}

const io = new IntersectionObserver(entries => {
  for (const e of entries) if (e.isIntersecting) fetchPage();
}, { rootMargin: '600px' });
io.observe(document.getElementById('sentinel'));

// ── Detail modal ──────────────────────────────────────────────────
let currentDetail = null;

async function openDetail(id) {
  const m = document.getElementById('modal');
  const body = document.getElementById('modal-body');
  body.innerHTML = `<div class="sub">━◯━ loading…</div>`;
  m.classList.add('open');
  try {
    const r = await fetch(withTok('/api/admin/products/' + id));
    if (!r.ok) { body.innerHTML = `<div class="err">HTTP ${r.status}</div>`; return; }
    currentDetail = await r.json();
    renderDetail(currentDetail);
  } catch (e) {
    body.innerHTML = `<div class="err">${escapeHtml(String(e))}</div>`;
  }
}
function closeModal() { document.getElementById('modal').classList.remove('open'); currentDetail = null; }

function renderDetail(d) {
  const body = document.getElementById('modal-body');
  const life = d.lifestyle_urls || [];
  while (life.length < 3) life.push(null);
  body.innerHTML = `
    <div class="modal-head">
      <div>
        <h3>${escapeHtml(d.brand)} · #${d.drop_num} · ${escapeHtml(d.name || '—')}</h3>
        <div class="sub">id ${d.id} · ${escapeHtml(d.created_at)} · ${d.active ? 'active' : 'inactive'} · ${d.sold}/${d.inventory}</div>
      </div>
      <div class="close" onclick="closeModal()">close</div>
    </div>

    <div class="photos">
      <div class="photo-section">
        <h4>━ デザイン (chest graphic / print file)</h4>
        <div class="photo-frame">${d.design_url ? `<img src="${escapeHtml(d.design_url)}">` : `<div class="empty">no design</div>`}</div>
        <div class="photo-url">${escapeHtml(d.design_url || '—')}</div>
        <div class="photo-actions">
          <button class="btn btn-sm" onclick="regenDesign(${d.id})">━ regen design (Gemini)</button>
        </div>
      </div>
      <div class="photo-section">
        <h4>━ プリントフル実物 (mockup)</h4>
        <div class="photo-frame">${d.mockup_url ? `<img src="${escapeHtml(d.mockup_url)}">` : `<div class="empty">no mockup</div>`}</div>
        <div class="photo-url">${escapeHtml(d.mockup_url || '—')}</div>
        <div class="photo-actions">
          <button class="btn btn-sm" onclick="regenMockup(${d.id})">━ regen mockup (Printful)</button>
        </div>
      </div>
    </div>

    <div class="photo-section" style="margin-bottom: 22px">
      <h4>━ 着画 3枚 (lifestyle)</h4>
      <div class="life-grid">
        ${life.slice(0,3).map((u,i) => `
          <div class="life-card">
            <div class="frame">${u ? `<img src="${escapeHtml(u)}">` : `<div class="empty">slot ${i+1}</div>`}</div>
          </div>`).join('')}
      </div>
      <div class="photo-actions" style="margin-top: 10px">
        <button class="btn btn-sm primary" onclick="regenLifestyle(${d.id})">━◯━ 着画 3 枚を Gemini で生成</button>
      </div>
    </div>

    <div class="edit-grid">
      <div class="edit-field">
        <label>name</label>
        <input id="e-name" value="${escapeHtml(d.name || '')}">
      </div>
      <div class="edit-field">
        <label>price (¥)</label>
        <input id="e-price" type="number" value="${d.price_jpy}">
      </div>
      <div class="edit-field">
        <label>cost (¥) ${d.cost_jpy == null ? `<span style="color:var(--mute);font-size:9px">default ¥${d.brand_default_cost_jpy}</span>` : ''}</label>
        <input id="e-cost" type="number" value="${d.cost_jpy != null ? d.cost_jpy : ''}" placeholder="default ¥${d.brand_default_cost_jpy}">
      </div>
      <div class="edit-field">
        <label>inventory</label>
        <input id="e-inventory" type="number" value="${d.inventory}">
      </div>
      <div class="edit-field">
        <label>active</label>
        <select id="e-active">
          <option value="1" ${d.active===1?'selected':''}>active</option>
          <option value="0" ${d.active===0?'selected':''}>inactive</option>
        </select>
      </div>
      <div class="edit-field full">
        <label>prompt_text (Gemini に投げるデザインの説明)</label>
        <textarea id="e-prompt">${escapeHtml(d.prompt_text || '')}</textarea>
      </div>
      <div class="edit-field full">
        <label>design_url</label>
        <input id="e-design" value="${escapeHtml(d.design_url || '')}">
      </div>
      <div class="edit-field full">
        <label>mockup_url</label>
        <input id="e-mockup" value="${escapeHtml(d.mockup_url || '')}">
      </div>
    </div>

    <div class="edit-actions">
      <button class="btn primary" onclick="saveEdits(${d.id})">━ save</button>
      <button class="btn" onclick="regenSimilar(${d.id})">━ 類似品を生成 (新 SKU)</button>
      <a class="btn" href="/products/${d.id}" target="_blank" rel="noopener">━ open product page ↗</a>
      <a class="btn" href="${escapeHtml(d.design_url || '#')}" target="_blank" rel="noopener">━ open design ↗</a>
    </div>
    <div id="detail-status" class="status-line" style="display:none"></div>
  `;
}

function setStatus(elId, kind, msg) {
  const e = document.getElementById(elId);
  if (!e) return;
  e.className = 'status-line ' + kind;
  e.textContent = msg;
  e.style.display = 'block';
}

async function saveEdits(id) {
  const costStr = document.getElementById('e-cost').value.trim();
  const body = {
    name: document.getElementById('e-name').value,
    prompt_text: document.getElementById('e-prompt').value,
    price_jpy: parseInt(document.getElementById('e-price').value || '0', 10),
    cost_jpy: costStr === '' ? null : parseInt(costStr, 10),
    inventory: parseInt(document.getElementById('e-inventory').value || '0', 10),
    active: parseInt(document.getElementById('e-active').value || '1', 10),
    design_url: document.getElementById('e-design').value,
    mockup_url: document.getElementById('e-mockup').value,
  };
  setStatus('detail-status', 'info', '━ saving…');
  try {
    let r = await fetch(withTok(`/api/admin/products/${id}/update`), {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    if (r.status === 422) {
      const errJ = await r.json();
      const msg = errJ.message || '価格が原価より低すぎ';
      if (!confirm(`⚠ 赤字保存\n\n${msg}\n\n強制保存しますか？`)) {
        setStatus('detail-status', 'err', '━ 保存中止 (赤字)');
        return;
      }
      r = await fetch(withTok(`/api/admin/products/${id}/update`), {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ ...body, force_loss: true }),
      });
    }
    if (!r.ok) { setStatus('detail-status', 'err', `HTTP ${r.status}`); return; }
    const j = await r.json();
    setStatus('detail-status', 'ok', `━ saved (${j.rows || 1} rows)`);
    // Refresh card in grid
    const card = [...document.querySelectorAll('#grid .card')].find(c => c.querySelector('.row1')?.textContent.includes(`id ${id}`));
    if (card) {
      const p = products.find(x => x.id === id);
      if (p) { p.name = body.name; p.price_jpy = body.price_jpy; p.inventory = body.inventory; p.active = body.active; p.design_url = body.design_url; p.mockup_url = body.mockup_url; }
    }
  } catch (e) { setStatus('detail-status', 'err', String(e)); }
}

async function regenDesign(id) {
  setStatus('detail-status', 'info', '━ Gemini で design を再生成中… (約20秒)');
  try {
    const promptOverride = document.getElementById('e-prompt')?.value || '';
    const r = await fetch(withTok(`/api/admin/products/${id}/regen_design`), {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(promptOverride ? { prompt: promptOverride } : {}),
    });
    const j = await r.json();
    if (!r.ok || !j.ok) { setStatus('detail-status', 'err', `regen failed: ${JSON.stringify(j)}`); return; }
    setStatus('detail-status', 'ok', `━ design updated → ${j.design_url}`);
    if (currentDetail) { currentDetail.design_url = j.design_url; renderDetail(currentDetail); }
  } catch (e) { setStatus('detail-status', 'err', String(e)); }
}

async function regenMockup(id) {
  setStatus('detail-status', 'info', '━ Printful mockup 再生成キュー中…');
  try {
    const r = await fetch(withTok(`/api/admin/products/${id}/regen_mockup`), { method: 'POST' });

    if (!r.ok) { setStatus('detail-status', 'err', `regen failed: ${JSON.stringify(j)}`); return; }

async function regenLifestyle(id) {
  setStatus('detail-status', 'info', '━ 着画 3 枚を Gemini で生成中… (1〜2分かかります)');
  try {
    const r = await fetch(withTok(`/api/admin/products/${id}/regen_lifestyle`), {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ count: 3 }),

async function regenSimilar(id) {
  const hint = prompt('変奏ヒント (空 OK)：', '同じ系統の別案');
  if (hint === null) return;
  setStatus('detail-status', 'info', '━ 類似品を Gemini で生成中…');
  try {
    const r = await fetch(withTok(`/api/admin/products/${id}/regen_similar`), {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ hint }),
    });
    const j = await r.json();
    if (!r.ok || !j.ok) { setStatus('detail-status', 'err', `regen similar failed: ${JSON.stringify(j)}`); return; }
    setStatus('detail-status', 'ok', `━ 新 SKU 作成 (id ${j.new_id} #${j.drop_num})`);
    setTimeout(() => { closeModal(); resetAndReload(); }, 800);
  } catch (e) { setStatus('detail-status', 'err', String(e)); }
}

// ── New SKU wizard (3 candidates) ─────────────────────────────────
let wizardEcho = null;
let wizardCandidates = [];

function openNewPanel() {
  document.getElementById('new-panel').classList.add('open');
  showWizStep(1);
  updatePriceRecommendation();
}
function closeWizard() {
  document.getElementById('new-panel').classList.remove('open');
  showWizStep(1);
}
function showWizStep(n) {
  document.getElementById('wiz-step1').style.display = n===1 ? 'block' : 'none';
  document.getElementById('wiz-step2').style.display = n===2 ? 'block' : 'none';
  document.getElementById('wiz-step3').style.display = n===3 ? 'block' : 'none';
}

// brand → デフォルト原価 (Rust 側と同期)
const BRAND_DEFAULT_COST = {
  mugen: 3200, regional: 3200, teshikaga: 3200, you: 3200,
  jiufight: 3500, sweep: 3500, ma: 6500,
};
function defaultCostFor(brand) { return BRAND_DEFAULT_COST[brand] || 3500; }
function recommendedPrice(cost) { return Math.ceil(cost * 1.5 / 100) * 100; }
function floorPrice(cost) { return Math.ceil(cost * 1.30 / 100) * 100; }

// Live recommendation in the wizard
function updatePriceRecommendation() {
  const brand = document.getElementById('n-brand').value.trim() || 'mugen';
  const costStr = document.getElementById('n-cost').value.trim();
  const cost = costStr ? parseInt(costStr, 10) : defaultCostFor(brand);
  const price = parseInt(document.getElementById('n-price').value || '0', 10);
  const reco = recommendedPrice(cost);
  const floor = floorPrice(cost);
  const hint = document.getElementById('n-price-hint');
  if (hint) {
    if (price < floor) {
      hint.style.color = 'var(--red)';
      hint.textContent = `⚠ 赤字: price ¥${price.toLocaleString()} < floor ¥${floor.toLocaleString()} (cost ¥${cost.toLocaleString()} × 1.30) — 推奨 ¥${reco.toLocaleString()}`;
    } else {
      hint.style.color = 'var(--mute)';
      hint.textContent = `cost ¥${cost.toLocaleString()} → 推奨 ¥${reco.toLocaleString()} (cost × 1.5)`;
    }
  }
}

async function genCandidates() {
  const body = {
    brand: document.getElementById('n-brand').value.trim() || 'mugen',
    name: document.getElementById('n-name').value.trim() || 'untitled',
    prompt: document.getElementById('n-prompt').value.trim(),
    count: parseInt(document.getElementById('n-count').value || '3', 10),
  };
  if (!body.prompt) { setStatus('new-status', 'err', '━ prompt 必須'); return; }
  const costStr = document.getElementById('n-cost').value.trim();
  const cost = costStr ? parseInt(costStr, 10) : null;
  const effectiveCost = cost ?? defaultCostFor(body.brand);
  const price = parseInt(document.getElementById('n-price').value || '6800', 10);
  const floor = floorPrice(effectiveCost);
  if (price < floor) {
    if (!confirm(`⚠ price ¥${price.toLocaleString()} は cost ¥${effectiveCost.toLocaleString()} に対して赤字。推奨 ¥${recommendedPrice(effectiveCost).toLocaleString()}。\n\nそれでも続行?`)) return;
  }
  wizardEcho = {
    ...body,
    price_jpy: price,
    cost_jpy: cost,
    inventory: parseInt(document.getElementById('n-inventory').value || '1', 10),
  };
  setStatus('new-status', 'info', `━ Gemini で ${body.count} 候補を並列生成中… (約 25〜35 秒)`);
  try {
    const r = await fetch(withTok('/api/admin/products/candidates'), {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    const j = await r.json();
    if (!r.ok || !j.ok) { setStatus('new-status', 'err', `候補生成失敗: ${JSON.stringify(j.errors||j)}`); return; }
    wizardCandidates = j.candidates || [];
    renderCandidates();
    showWizStep(2);
  } catch (e) { setStatus('new-status', 'err', String(e)); }
}

function renderCandidates() {
  const grid = document.getElementById('cand-grid');
  grid.innerHTML = wizardCandidates.map((c, i) => `
    <div class="card" style="cursor:pointer" onclick="pickCandidate(${i})">
      <div class="thumb"><img src="${escapeHtml(c.design_url)}" alt="candidate ${c.idx+1}"></div>
      <div class="meta">
        <div class="row1"><span class="brand">候補 ${c.idx+1}</span><span>click to pick →</span></div>
        <div class="name" style="min-height:auto">${escapeHtml(wizardEcho.name)}</div>
      </div>
    </div>`).join('');
}

function backToStep1() { showWizStep(1); }

async function pickCandidate(i) {
  const c = wizardCandidates[i];
  if (!c) return;
  setStatus('wiz2-status', 'info', `━ 候補 ${c.idx+1} で SKU 化中… 着画 3 + Printful mockup は背景で開始`);
  try {
    const r = await fetch(withTok('/api/admin/products/from_candidate'), {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        brand: wizardEcho.brand,
        name: wizardEcho.name,
        prompt: wizardEcho.prompt,
        price_jpy: wizardEcho.price_jpy,
        cost_jpy: wizardEcho.cost_jpy,
        inventory: wizardEcho.inventory,
        design_url: c.design_url,
        auto_lifestyle: true,
        auto_mockup: true,
      }),
    });
    const j = await r.json();
    if (!r.ok || !j.ok) { setStatus('wiz2-status', 'err', `SKU 化失敗: ${JSON.stringify(j)}`); return; }
    document.getElementById('wiz3-msg').textContent = `━ id ${j.new_id} #${j.drop_num} (${j.brand}) を作成 → design_url 保存済み`;
    const btn = document.getElementById('wiz3-open');
    btn.onclick = () => { closeWizard(); openDetail(j.new_id); };
    showWizStep(3);
  } catch (e) { setStatus('wiz2-status', 'err', String(e)); }
}

// Initial load
fetchPage();
