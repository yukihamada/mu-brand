<!DOCTYPE html><html lang="ja"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin · Products · Score</title>
<style>
:root{--bg:#0a0a0a;--fg:#e8dcc8;--gold:#e6c449;--accent:#dc2626;--card:#0d0d0d;--border:#222;--mono:'SF Mono',ui-monospace,monospace;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--fg);font-family:-apple-system,system-ui,sans-serif;padding:30px 24px;min-height:100vh;}
h1{font-size:28px;font-weight:900;letter-spacing:-0.01em;margin-bottom:6px;}
.sub{font-family:var(--mono);font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);opacity:0.7;margin-bottom:24px;}
.bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;font-family:var(--mono);font-size:12px;align-items:center;}
.bar a, .bar select, .bar input{padding:6px 12px;border:1px solid var(--border);border-radius:18px;color:var(--fg);text-decoration:none;background:#0a0a0a;font-family:var(--mono);}
.bar a:hover, .bar select:hover{border-color:var(--gold);}
.bar .stat{padding:6px 12px;opacity:0.6;}
table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;font-size:12px;}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);vertical-align:middle;}
th{background:#111;font-family:var(--mono);font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);font-weight:600;cursor:pointer;user-select:none;}
th:hover{color:#fff;}
tr:hover{background:#111;}
.thumb{width:46px;height:46px;border-radius:6px;background:#111;object-fit:cover;display:block;}
.thumb-empty{width:46px;height:46px;border-radius:6px;background:#1a1500;}
.sku-mono{font-family:var(--mono);font-size:11px;opacity:0.7;}
.label-name{font-weight:700;font-size:13px;}
.brand-pill{display:inline-block;padding:2px 8px;border:1px solid var(--border);border-radius:12px;font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;opacity:0.6;}
.num{font-family:var(--mono);text-align:right;font-variant-numeric:tabular-nums;}
.gold{color:var(--gold);}
.pct{font-family:var(--mono);text-align:right;}
.pct.hi{color:#22c55e;}
.pct.lo{color:#666;}
.status-pill{display:inline-block;padding:2px 8px;border-radius:12px;font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;}
.status-live{background:#06291f;color:#22c55e;border:1px solid #08402d;}
.status-draft{background:#291f06;color:#e6c449;border:1px solid #402d08;}
.empty{padding:60px 20px;text-align:center;opacity:0.5;font-family:var(--mono);}
</style>
</head><body>

<h1>Products · Score Board</h1>
<div class="sub">— ADMIN · CATALOG_PRODUCTS × CATALOG_SKU_METRICS —</div>

<div class="bar">
  <a href="/admin/brands-v2?token={{token}}">→ Brands</a>
  <select id="brand-filter" onchange="reload()">
    <option value="">all brands</option>
  </select>
  <select id="sort-by" onchange="reload()">
    <option value="clicks">sort: clicks ↓</option>
    <option value="impressions">sort: impressions ↓</option>
    <option value="ctr">sort: CTR% ↓</option>
    <option value="checkouts">sort: checkouts ↓</option>
    <option value="cvr">sort: CVR% ↓</option>
    <option value="price">sort: price ↓</option>
    <option value="sku">sort: sku</option>
  </select>
  <select id="limit" onchange="reload()">
    <option value="100">100</option>
    <option value="200" selected>200</option>
    <option value="500">500</option>
    <option value="1000">1000</option>
  </select>
  <span class="stat" id="total-stat">…</span>
  <span class="stat" id="imp-stat">…</span>
  <span class="stat" id="clk-stat">…</span>
</div>

<table>
  <thead>
    <tr>
      <th></th>
      <th>Label</th>
      <th>Brand</th>
      <th class="num">¥</th>
      <th class="num">Impr</th>
      <th class="num">Clicks</th>
      <th class="num">CTR%</th>
      <th class="num">Sales</th>
      <th class="num">CVR%</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="tbody">
    <tr><td colspan="10" class="empty">loading…</td></tr>
  </tbody>
</table>

<script>
const TOKEN = new URLSearchParams(location.search).get('token') || '';
document.querySelectorAll('a').forEach(a => a.href = a.href.replace('{{token}}', encodeURIComponent(TOKEN)));
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const yen = n => '¥' + (n|0).toLocaleString('ja-JP');

async function loadBrandOptions(){
  const r = await fetch('/api/brands');
  if (!r.ok) return;
  const d = await r.json();
  const sel = document.getElementById('brand-filter');
  (d.brands || []).forEach(b => {
    const opt = document.createElement('option');
    opt.value = b.slug;
    opt.textContent = `${b.emoji || '◯'} ${b.name} · ${b.product_count} SKUs`;
    sel.appendChild(opt);
  });
}

async function reload(){
  const brand = document.getElementById('brand-filter').value;
  const sort = document.getElementById('sort-by').value;
  const limit = document.getElementById('limit').value;
  const qs = new URLSearchParams({token: TOKEN, sort, limit});
  if (brand) qs.set('brand', brand);
  const r = await fetch('/api/admin/score?' + qs);
  if (!r.ok) { document.getElementById('tbody').innerHTML = '<tr><td colspan="10" class="empty">load failed (status '+r.status+')</td></tr>'; return; }
  const d = await r.json();
  const items = d.products || [];
  const totalImp = items.reduce((s, p) => s + (p.impressions || 0), 0);
  const totalClk = items.reduce((s, p) => s + (p.clicks || 0), 0);
  document.getElementById('total-stat').textContent = `${items.length} rows`;
  document.getElementById('imp-stat').textContent = `${totalImp.toLocaleString()} impr`;
  document.getElementById('clk-stat').textContent = `${totalClk.toLocaleString()} clk`;

  document.getElementById('tbody').innerHTML = items.map(p => {
    const thumb = p.mockup_url
      ? `<img class="thumb" src="${esc(p.mockup_url)}" alt="" onerror="this.outerHTML='<div class=&quot;thumb-empty&quot;></div>'">`
      : `<div class="thumb-empty"></div>`;
    return `
      <tr>
        <td>${thumb}</td>
        <td>
          <div class="label-name">${esc(p.label)}</div>
          <div class="sku-mono">${esc(p.sku)}</div>
        </td>
        <td><span class="brand-pill">${esc(p.brand)}</span></td>
        <td class="num">${yen(p.price_jpy)}</td>
        <td class="num">${(p.impressions||0).toLocaleString()}</td>
        <td class="num gold">${(p.clicks||0).toLocaleString()}</td>
        <td class="pct ${p.ctr_pct>5?'hi':'lo'}">${(p.ctr_pct||0).toFixed(2)}%</td>
        <td class="num">${(p.checkouts||0).toLocaleString()}</td>
        <td class="pct ${p.cvr_pct>2?'hi':'lo'}">${(p.cvr_pct||0).toFixed(2)}%</td>
        <td><span class="status-pill status-${esc(p.status||'live')}">${esc(p.status||'live')}</span></td>
      </tr>`;
  }).join('') || '<tr><td colspan="10" class="empty">no products</td></tr>';
}

loadBrandOptions().then(reload);
</script>
</body></html>
