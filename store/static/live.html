<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:#000;color:#fff;font:15px/1.5 -apple-system,system-ui,'Segoe UI',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased}
.stage{position:fixed;inset:0;background:#0a0a0c}
.stage img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;opacity:0;transition:opacity 1.1s ease;will-change:opacity,transform}
.stage img.on{opacity:1;animation:kb 8s ease-in-out forwards}
@keyframes kb{from{transform:scale(1.04)}to{transform:scale(1.10)}}
.scrim{position:fixed;inset:0;background:linear-gradient(180deg,#000a 0%,#0000 22%,#0000 60%,#000c 100%);pointer-events:none}
.top{position:fixed;top:0;left:0;right:0;padding:18px 22px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.brand{font-size:18px;font-weight:800;letter-spacing:1px}
.brand .live{color:#3fb950}.brand .live .d{animation:p 1.4s infinite}@keyframes p{50%{opacity:.2}}
.now{font-size:13px;color:#cdbcff;background:#ffffff14;border:1px solid #ffffff22;border-radius:99px;padding:6px 14px;backdrop-filter:blur(8px);max-width:62vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bot{position:fixed;left:0;right:0;bottom:0;padding:18px 22px;display:flex;justify-content:space-between;align-items:flex-end;gap:14px;flex-wrap:wrap}
.flow{display:flex;gap:18px;font-size:12px;color:#aeaeba}
.flow b{display:block;font-size:22px;font-weight:800;color:#fff;line-height:1.1}
.flow .sel b{color:#e6b34a}.flow .prod b{color:#3fb950}
.tag{font-size:12px;color:#9a9aa8;text-align:right}.tag a{color:#cdbcff}
.kind{position:fixed;left:22px;top:50%;transform:translateY(-50%) rotate(180deg);writing-mode:vertical-rl;font-size:11px;letter-spacing:3px;color:#ffffff66;text-transform:uppercase}
</style></head><body>
<div class="stage"><img id="a" alt="MUデザイン（AI生成・ローカル）"><img id="b" alt="MUデザイン（AI生成・ローカル）"></div>
<div class="scrim"></div>
<div class="kind" id="kind"></div>
<header class="top">
  <div class="brand"><span class="live">●<span class="d"> </span></span> MU LIVE</div>
  <div class="now" id="now">接続中…</div>
</header>
<footer class="bot">
  <div class="flow">
    <div><b id="ftot">–</b>完成</div>
    <div class="sel"><b id="fsel">–</b>採択</div>
    <div class="prod"><b id="fprod">–</b>商品</div>
  </div>
  <div class="tag">🖥 Apple M5 Mac でいま生成中・完全ローカル<br><a href="/printful">商品モック一覧 →</a> ・ <a href="/shop">MUを見る →</a></div>
</footer>
<script>
const API="https://m5-mu.chatweb.ai";
let items=[],idx=0,cur="a";
function abs(u){return u&&u[0]=="/"?API+u:u}
async function pull(){
 try{
  const d=await(await fetch(API+"/api/showcase?ts="+Date.now())).json();
  if(d.items&&d.items.length)items=d.items;
  document.getElementById("now").textContent=d.status||"";
  document.getElementById("ftot").textContent=d.total??"–";
  document.getElementById("fsel").textContent=d.selected??"–";
  document.getElementById("fprod").textContent=d.products??"–";
 }catch(e){document.getElementById("now").textContent="m5に再接続中…"}
}
function advance(){
 if(!items.length)return;
 const it=items[idx%items.length]; idx++;
 const next=cur=="a"?"b":"a";
 const ni=document.getElementById(next), ci=document.getElementById(cur);
 ni.onload=()=>{ni.classList.add("on");ci.classList.remove("on");cur=next};
 ni.src=abs(it.url);
 document.getElementById("kind").textContent=it.kind||"";
}
pull(); setInterval(pull,15000);
setTimeout(()=>{advance();setInterval(advance,3800)},400);
</script></body></html>
