<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>forge — MU</title>
<meta name="robots" content="noindex,nofollow">
<style>
:root{
  --bg:#0b0a08; --ink:#efe8dc; --mute:#7e7468; --line:rgba(212,175,85,.13);
  --gold:#d4af55; --gold-hi:#ecc763; --warm:#1a1612;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg); color:var(--ink);
  font-family:'Noto Sans JP','Hiragino Sans',-apple-system,sans-serif;
  line-height:1.65; -webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(1200px 600px at 50% -10%, rgba(212,175,85,.04), transparent 60%),
    radial-gradient(800px 400px at 10% 110%, rgba(212,175,85,.025), transparent 60%);
}
a{color:var(--gold-hi);text-decoration:none;border-bottom:1px solid rgba(236,199,99,.3)}

.top{
  position:fixed; top:0; left:0; right:0; z-index:20;
  padding:18px 24px; display:flex; align-items:center; gap:14px;
  background:linear-gradient(180deg, rgba(11,10,8,.95) 0%, rgba(11,10,8,0) 100%);
  backdrop-filter:blur(8px);
  pointer-events:none;
}
.top .mark{
  font-family:'Noto Serif JP',serif; font-size:13px; letter-spacing:.4em;
  color:var(--gold); pointer-events:auto;
}
.top .small{font-size:10px;letter-spacing:.3em;color:var(--mute);margin-left:auto;pointer-events:auto}

main{
  max-width:680px; margin:0 auto;
  padding:120px 24px 200px;
}

.exhale{margin-bottom:80px}
.exhale .ask{
  font-family:'Noto Serif JP',serif;
  font-size:13px; letter-spacing:.35em; color:var(--mute);
  margin-bottom:14px;
  animation:driftIn 1.2s ease both;
}
.exhale textarea{
  width:100%; background:transparent; border:none; outline:none;
  color:var(--ink); font-family:'Noto Serif JP',serif;
  font-size:26px; line-height:1.5; resize:none;
  padding:6px 0; min-height:60px;
  border-bottom:1px solid var(--line);
  transition:border-color .8s ease;
}
.exhale textarea:focus{border-color:rgba(212,175,85,.55)}
.exhale textarea::placeholder{color:#4a443c;font-style:normal}
.exhale .hint{
  margin-top:10px; font-size:11px; color:var(--mute); letter-spacing:.15em;
  display:flex; gap:14px; flex-wrap:wrap;
  opacity:0; transition:opacity .6s ease;
}
.exhale.focused .hint{opacity:1}
.exhale .hint kbd{
  font-family:inherit; padding:1px 7px; border:1px solid var(--line); border-radius:3px;
  font-size:10px; color:var(--ink); background:rgba(255,255,255,.02);
}
.exhale .hint .ex{cursor:pointer;color:var(--mute);transition:color .15s}
.exhale .hint .ex:hover{color:var(--gold)}

.beat{
  margin:64px 0;
  opacity:0; transform:translateY(8px);
  transition:opacity 1.1s ease, transform 1.1s ease;
  pointer-events:none;
}
.beat.on{opacity:1; transform:translateY(0); pointer-events:auto}
.beat .frame{
  background:transparent;
  display:flex; align-items:center; justify-content:center;
  min-height:200px; position:relative;
}
.beat img{
  display:block; max-width:100%; max-height:560px;
  border-radius:2px; opacity:0; transition:opacity 1.4s ease;
}
.beat img.in{opacity:1}
.beat .breath{
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-family:'Noto Serif JP',serif; font-size:11px; letter-spacing:.6em;
  color:var(--mute);
  animation:breathe 2.4s ease-in-out infinite;
}
.beat.thinking .breath{display:flex}
.beat:not(.thinking) .breath{display:none}

.whisper{
  margin:34px 0 14px; text-align:center;
  font-size:12px; letter-spacing:.25em; color:var(--mute);
  opacity:0; transition:opacity .8s ease .2s;
}
.whisper.on{opacity:1}
.chips{
  display:none; gap:6px; justify-content:center; flex-wrap:wrap;
  margin-top:14px;
}
.chips.on{display:flex}
.chip{
  background:transparent; border:1px solid var(--line); color:var(--ink);
  padding:9px 18px; border-radius:999px; font-family:inherit; font-size:12px;
  cursor:pointer; letter-spacing:.1em;
  transition:all .25s ease;
}
.chip:hover{border-color:var(--gold);color:var(--gold-hi)}
.chip.on{border-color:var(--gold);background:rgba(212,175,85,.08);color:var(--gold-hi)}
.chip small{display:block;font-size:9px;color:var(--mute);margin-top:2px;letter-spacing:.15em}

.ship{
  margin-top:80px; padding-top:38px; border-top:1px solid var(--line);
  opacity:0; transform:translateY(6px);
  transition:opacity 1s ease, transform 1s ease;
  pointer-events:none;
}
.ship.on{opacity:1;transform:translateY(0);pointer-events:auto}
.ship .meta{
  display:grid; grid-template-columns:1fr 1fr; gap:18px 22px;
  margin-bottom:22px;
}
.ship label{
  display:block; font-size:10px; letter-spacing:.3em; color:var(--mute);
  margin-bottom:6px; text-transform:uppercase;
}
.ship input[type=text]{
  width:100%; background:transparent; border:none; border-bottom:1px solid var(--line);
  color:var(--ink); font-family:inherit; font-size:15px; padding:6px 0; outline:none;
  transition:border-color .25s;
}
.ship input[type=text]:focus{border-color:var(--gold)}
.ship .price{
  display:flex; align-items:baseline; gap:14px;
  font-family:'Noto Serif JP',serif;
}
.ship .price .yen{font-size:32px; color:var(--gold-hi); font-weight:600; min-width:130px; font-variant-numeric:tabular-nums}
.ship .price input[type=range]{flex:1; accent-color:var(--gold)}
.ship .split{
  display:flex; gap:22px; font-size:11px; color:var(--mute); margin-top:8px;
  letter-spacing:.1em;
}
.ship .split span b{color:var(--ink);font-weight:500;margin-left:6px}
.ship .go{
  margin-top:32px; display:flex; align-items:center; gap:18px;
}
.ship .go button{
  background:transparent; border:1px solid var(--gold); color:var(--gold-hi);
  padding:12px 32px; font-family:'Noto Serif JP',serif; font-size:14px;
  letter-spacing:.4em; cursor:pointer; border-radius:2px;
  transition:all .25s ease;
}
.ship .go button:hover{background:var(--gold);color:#1a1408}
.ship .go button:disabled{opacity:.4;cursor:wait}
.ship .go .note{font-size:11px; color:var(--mute); letter-spacing:.15em}

.url-bloom{
  margin-top:48px; padding:22px 0; text-align:center;
  opacity:0; transform:scale(.98);
  transition:opacity 1.6s ease, transform 1.6s ease;
}
.url-bloom.on{opacity:1; transform:scale(1)}
.url-bloom .label{
  font-family:'Noto Serif JP',serif; font-size:11px; letter-spacing:.6em;
  color:var(--mute); margin-bottom:14px;
}
.url-bloom .u{
  font-family:'JetBrains Mono','SF Mono',monospace; font-size:14px;
  color:var(--gold-hi); cursor:pointer; padding:10px 16px;
  border:1px dashed var(--line); border-radius:3px; display:inline-block;
  transition:all .2s ease;
}
.url-bloom .u:hover{border-color:var(--gold); background:rgba(212,175,85,.04)}
.url-bloom .u.copied{border-style:solid; color:#7ed492; border-color:#7ed492}

.err{
  margin-top:14px; font-size:11px; color:#ff9aaa; letter-spacing:.1em;
  opacity:0; transition:opacity .3s;
}
.err.on{opacity:1}

@keyframes driftIn{
  from{opacity:0; transform:translateY(6px)}
  to{opacity:1; transform:translateY(0)}
}
@keyframes breathe{
  0%,100%{opacity:.4; letter-spacing:.6em}
  50%{opacity:1; letter-spacing:.9em}
}
</style>
</head>
<body>

<div class="top">
  <span class="mark">━◯━ MU</span>
  <span class="small">forge</span>
</div>

<main>
  <section class="exhale" id="exhale">
    <div class="ask">— 思いつきを、ひと息で。</div>
    <textarea id="prompt" rows="2" placeholder="黒地、金の月、波紋。 極ミニマル。"></textarea>
    <div class="hint">
      <span><kbd>⌘</kbd> + <kbd>Enter</kbd> で 生まれる</span>
      <span class="ex" data-ex="黒地、金の月、波紋。 極ミニマル。">月と波紋</span>
      <span class="ex" data-ex="柔術帯のグラデーション。白から黒へ、襟の縫い目みたいな細い線。">帯グラデ</span>
      <span class="ex" data-ex="古今、焼肉の焔、漆塗りの黒に金箔。">焔と漆</span>
    </div>
  </section>

  <section class="beat" id="beat-design">
    <div class="frame">
      <div class="breath">DRAWING</div>
      <img id="img-design" alt="">
    </div>
  </section>

  <div class="whisper" id="whisper">— どの服に？</div>
  <div class="chips" id="chips">
    <button class="chip" data-prod="tee" data-cost="2200">Tシャツ<small>¥2,200</small></button>
    <button class="chip" data-prod="rashguard_ls" data-cost="4800">ラッシュ長袖<small>¥4,800</small></button>
    <button class="chip" data-prod="leggings" data-cost="4400">スパッツ<small>¥4,400</small></button>
    <button class="chip" data-prod="hoodie" data-cost="5200">パーカー<small>¥5,200</small></button>
  </div>

  <section class="beat" id="beat-mockup">
    <div class="frame">
      <div class="breath">DRESSING</div>
      <img id="img-mockup" alt="">
    </div>
  </section>

  <section class="beat" id="beat-lifestyle">
    <div class="frame">
      <div class="breath">WEARING</div>
      <img id="img-lifestyle" alt="">
    </div>
  </section>

  <section class="ship" id="ship">
    <div class="meta">
      <div>
        <label>NAME</label>
        <input type="text" id="title" placeholder="月と波紋">
      </div>
      <div>
        <label>YOU</label>
        <input type="text" id="designer" placeholder="@you">
      </div>
    </div>

    <div class="price">
      <span class="yen" id="yen">¥6,800</span>
      <input type="range" id="price" min="2500" max="22000" step="100" value="6800">
    </div>
    <div class="split">
      <span>原価<b id="m-cost">¥—</b></span>
      <span>あなた<b id="m-you">¥—</b></span>
      <span>MU<b id="m-mu">¥—</b></span>
    </div>

    <div class="go">
      <button id="btn-mint">公 開</button>
      <span class="note">在庫 ゼロ — 売れた瞬間にだけ作られる</span>
    </div>
    <div class="err" id="err-mint"></div>
  </section>

  <div class="url-bloom" id="bloom">
    <div class="label">— あなたの 共有 URL</div>
    <div class="u" id="u"></div>
  </div>
</main>

<script>
'use strict';
const S = { design:null, mockup:null, lifestyle:null, product:null, prompt:'' };
const $ = id => document.getElementById(id);

function show(beat){ $('beat-'+beat).classList.add('on') }
function think(beat, on){ $('beat-'+beat).classList.toggle('thinking', on); if(on) show(beat) }
function loadImg(beat, url){
  const im = $('img-'+beat);
  im.classList.remove('in');
  im.src = url;
  im.onload = () => { think(beat,false); requestAnimationFrame(()=>im.classList.add('in')) };
}
async function post(url, body){
  const r = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  if (!r.ok) throw new Error((await r.text()).slice(0,200) || ('HTTP '+r.status));
  return r.json();
}

const promptEl = $('prompt');
const exhale = $('exhale');
promptEl.addEventListener('focus', ()=>exhale.classList.add('focused'));
promptEl.addEventListener('blur', ()=>{ if(!promptEl.value.trim()) exhale.classList.remove('focused') });
document.querySelectorAll('.ex').forEach(el=>el.addEventListener('click', ()=>{
  promptEl.value = el.dataset.ex; promptEl.focus(); generate();
}));
promptEl.addEventListener('keydown', e=>{
  if ((e.metaKey||e.ctrlKey) && e.key === 'Enter'){ e.preventDefault(); generate() }
});

async function generate(){
  const p = promptEl.value.trim();
  if (!p) return;
  S.prompt = p;
  think('design', true);
  try{
    const r = await post('/api/forge/design', {prompt:p});
    if (!r.url) throw new Error('no url');
    S.design = r.url; loadImg('design', r.url);
    setTimeout(()=>{ $('whisper').classList.add('on'); $('chips').classList.add('on') }, 600);
  }catch(e){ think('design', false); console.error(e); alert('生成 失敗: '+e.message) }
}

document.querySelectorAll('.chip').forEach(c=>c.addEventListener('click', async ()=>{
  if (!S.design){ return }
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
  c.classList.add('on');
  S.product = { type:c.dataset.prod, cost:+c.dataset.cost };
  updateSplit();
  think('mockup', true);
  try{
    const r = await post('/api/forge/mockup', {design_url:S.design, product_type:S.product.type});
    if (!r.url) throw new Error('no url');
    S.mockup = r.url; loadImg('mockup', r.url);
    setTimeout(async ()=>{
      think('lifestyle', true);
      try{
        const r2 = await post('/api/forge/lifestyle', {mockup_url:S.mockup, product_type:S.product.type});
        if (!r2.url) throw new Error('no url');
        S.lifestyle = r2.url; loadImg('lifestyle', r2.url);
        setTimeout(()=>$('ship').classList.add('on'), 800);
      }catch(e){ think('lifestyle', false); console.error(e) }
    }, 1400);
  }catch(e){ think('mockup', false); console.error(e) }
}));

function updateSplit(){
  const p = +$('price').value;
  $('yen').textContent = '¥' + p.toLocaleString();
  const cost = S.product ? S.product.cost : 0;
  const margin = Math.max(0, p - cost);
  const you = Math.round(margin * .65);
  const mu  = margin - you;
  $('m-cost').textContent = '¥' + cost.toLocaleString();
  $('m-you').textContent  = '¥' + you.toLocaleString();
  $('m-mu').textContent   = '¥' + mu.toLocaleString();
}
$('price').addEventListener('input', updateSplit);
updateSplit();

$('btn-mint').addEventListener('click', async ()=>{
  if (!S.lifestyle){ $('err-mint').textContent='まだ着画ができてない'; $('err-mint').classList.add('on'); return }
  $('err-mint').classList.remove('on');
  $('btn-mint').disabled = true;
  try{
    const r = await post('/api/forge/mint', {
      title:$('title').value.trim() || 'untitled',
      designer:$('designer').value.trim(),
      product_type:S.product.type,
      cost_jpy:S.product.cost,
      price_jpy:+$('price').value,
      design_url:S.design, mockup_url:S.mockup, lifestyle_url:S.lifestyle,
      prompt:S.prompt,
    });
    if (!r.slug) throw new Error('no slug');
    const url = location.origin + '/p/forge/' + r.slug;
    $('u').textContent = url;
    $('u').onclick = async ()=>{ try{ await navigator.clipboard.writeText(url); $('u').classList.add('copied'); $('u').textContent='✓ '+url }catch{} };
    $('bloom').classList.add('on');
  }catch(e){ $('err-mint').textContent='公開 失敗: '+e.message; $('err-mint').classList.add('on') }
  finally{ $('btn-mint').disabled = false }
});
</script>
</body>
</html>
