<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>無音祭 — CONSOLE</title>
<style>
  :root { --black:#0A0A0A; --white:#FAFAFA; --red:#C8362C; --gold:#e6c449; --grey:#1a1a1a; --line:rgba(250,250,250,0.12); }
  *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--black); color:var(--white);
    font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif; font-weight:200;
    -webkit-font-smoothing:antialiased; padding:32px 24px 60px; max-width:560px; margin:0 auto; }
  h1 { font-size:13px; letter-spacing:0.4em; text-transform:uppercase; font-weight:600; }
  .sub { font-size:11px; opacity:0.45; margin-top:8px; letter-spacing:0.08em; line-height:1.7; }
  .tokrow { margin:22px 0; display:flex; gap:10px; }
  input { background:var(--grey); border:1px solid var(--line); color:var(--white); padding:12px 14px;
    font-family:inherit; font-size:14px; flex:1; }
  .panel { border:1px solid var(--line); background:var(--grey); padding:24px; margin-top:18px; }
  .panel h2 { font-size:10px; letter-spacing:0.3em; text-transform:uppercase; opacity:0.5; margin-bottom:16px; }
  .big-btn { display:block; width:100%; padding:24px; font-family:inherit; font-size:15px;
    letter-spacing:0.25em; text-transform:uppercase; font-weight:600; cursor:pointer; border:0;
    border-radius:3px; margin-top:10px; }
  .go { background:var(--gold); color:var(--black); }
  .arm { background:transparent; color:var(--gold); border:1px solid var(--gold); }
  .kill { background:var(--red); color:var(--white); }
  .row { display:flex; gap:8px; margin-top:10px; }
  .row button { flex:1; padding:14px; font-family:inherit; font-size:12px; letter-spacing:0.15em;
    background:transparent; color:var(--white); border:1px solid var(--line); cursor:pointer; }
  .row button:active { border-color:var(--gold); color:var(--gold); }
  .stat { display:flex; justify-content:space-between; font-size:13px; padding:8px 0;
    border-bottom:1px solid var(--line); }
  .stat b { color:var(--gold); font-weight:400; font-variant-numeric:tabular-nums; }
  #msg { font-size:12px; min-height:18px; margin-top:14px; opacity:0.7; }
  .qr { text-align:center; margin-top:14px; }
  .qr a { color:var(--gold); font-size:12px; letter-spacing:0.1em; }
  .warn { color:var(--red); }
</style>
</head>
<body>
  <h1>無音祭 — CONSOLE</h1>
  <div class="sub">人間ゲート。押せるのは3つだけ：<b>武装→発音</b>、<b>チャンネル</b>、<b>全停止</b>。<br>不可逆な操作はここから。落ち着いて。</div>

  <div class="tokrow">
    <input id="token" type="password" placeholder="ADMIN_TOKEN" />
    <button class="row" style="flex:0 0 auto;padding:0 18px" onclick="connect()">接続</button>
  </div>

  <div class="panel">
    <h2>Live</h2>
    <div class="stat"><span>参加端末が見る fire</span><b id="sFire">—</b></div>
    <div class="stat"><span>サーバー時刻</span><b id="sNow">—</b></div>
    <div class="stat"><span>チャンネル</span><b id="sCh">—</b></div>
    <div class="stat"><span>状態</span><b id="sState">—</b></div>
  </div>

  <div class="panel">
    <h2>一斉発音（クライマックス）</h2>
    <button class="big-btn arm" onclick="fireIn(10)">10秒後に 一斉発音</button>
    <div class="row">
      <button onclick="fireIn(5)">5秒後</button>
      <button onclick="fireIn(30)">30秒後</button>
      <button onclick="fireIn(60)">60秒後</button>
    </div>
    <button class="big-btn arm" style="margin-top:10px" onclick="clearFire()">予約を取り消す</button>
  </div>

  <div class="panel">
    <h2>チャンネル（無 / 間 / 無限）</h2>
    <div class="row">
      <button onclick="setCh(0)">無</button>
      <button onclick="setCh(1)">間</button>
      <button onclick="setCh(2)">無限</button>
    </div>
  </div>

  <div class="panel">
    <h2 class="warn">緊急</h2>
    <button class="big-btn kill" onclick="killAll()">全停止 — 全端末を無音に</button>
  </div>

  <div id="msg"></div>

  <div class="qr">
    <div class="sub">参加者はこれを開く：</div>
    <a href="/fest/sync" target="_blank">wearmu.com/fest/sync</a>
  </div>

<script>
  const qp = new URLSearchParams(location.search);
  if(qp.get('token')) document.getElementById('token').value = qp.get('token');
  function tok(){ return document.getElementById('token').value.trim(); }
  function msg(t, warn){ const m=document.getElementById('msg'); m.textContent=t; m.className=warn?'warn':''; }

  async function api(path, opts){
    const sep = path.includes('?') ? '&' : '?';
    const r = await fetch(path + sep + 'token=' + encodeURIComponent(tok()), opts||{});
    if(r.status===401||r.status===403){ msg('トークンが違います', true); throw new Error('auth'); }
    return r.json();
  }

  async function connect(){ msg('接続中…'); await refresh(); msg('接続しました。'); }

  async function refresh(){
    try {
      const r = await fetch('/api/fest/sync', {cache:'no-store'});
      const j = await r.json();
      const now = j.server_ms|0, fire = j.fire_ms|0;
      document.getElementById('sNow').textContent = new Date(now).toLocaleTimeString('ja-JP');
      document.getElementById('sFire').textContent = fire>0 ? ('あと '+Math.max(0,Math.round((fire-now)/1000))+'s') : '—';
      document.getElementById('sCh').textContent = ['無','間','無限'][j.channel] ?? j.channel;
      document.getElementById('sState').textContent = j.killed ? '停止中' : (fire>0?'武装':'通常');
    } catch(e){}
  }

  async function fireIn(s){
    try { await api('/api/fest/sync/set?in='+s, {method:'POST'}); msg(s+'秒後に一斉発音をセットしました。'); refresh(); }
    catch(e){}
  }
  async function clearFire(){ try { await api('/api/fest/sync/clear', {method:'POST'}); msg('予約を取り消しました。'); refresh(); } catch(e){} }
  async function setCh(c){ try { await api('/api/fest/sync/channel?ch='+c, {method:'POST'}); msg('チャンネル '+['無','間','無限'][c]+' に切替。'); refresh(); } catch(e){} }
  async function killAll(){
    if(!confirm('全端末を即・無音にします。よろしいですか？')) return;
    try { await api('/api/fest/sync/kill', {method:'POST'}); msg('全停止しました。', true); refresh(); } catch(e){}
  }

  setInterval(()=>{ if(tok()) refresh(); }, 1000);
</script>
</body>
</html>
