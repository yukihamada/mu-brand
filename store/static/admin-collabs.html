<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MU · Collab dashboard</title>
<meta name="robots" content="noindex">
<style>
  :root { --bg:#0A0A0A; --fg:#F5F5F0; --mute:#888; --accent:#e6c449; --line:#1c1c1c; --green:#7be57b; --red:#ff4a3d; --warn:#ffb24a; --card:#0f0f0f; }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--fg); margin: 0; font-family: ui-monospace, "SF Mono", Menlo, "Helvetica Neue", Arial, sans-serif; line-height: 1.55; font-size: 13px; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  header { padding: 18px 24px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  header h1 { font-size: 14px; letter-spacing: 0.4em; margin: 0; font-weight: 700; }
  header .meta { color: var(--mute); font-size: 11px; letter-spacing: 0.18em; }
  .wrap { padding: 24px 24px 80px; max-width: 1400px; margin: 0 auto; }
  .toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 24px; align-items: center; }
  .toolbar label { color: var(--mute); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; }
  .toolbar input[type=text], .toolbar select {
    background: #0f0f0f; border: 1px solid var(--line); color: var(--fg);
    padding: 7px 11px; font-family: inherit; font-size: 12px; border-radius: 4px;
  }
  .toolbar input[type=text] { width: 240px; }
  .toolbar input[type=checkbox] { accent-color: var(--accent); }
  .grid { display: grid; grid-template-columns: 1fr; gap: 24px; }
  @media (min-width: 1100px) { .grid { grid-template-columns: 1fr 1fr; } }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 10px;
    padding: 18px 20px; display: flex; flex-direction: column; gap: 14px;
  }
  .card h3 { font-size: 14px; margin: 0; letter-spacing: 0.06em; display: flex; gap: 10px; align-items: baseline; flex-wrap: wrap; }
  .card h3 .slug { color: var(--accent); font-weight: 700; }
  .card h3 .name { color: var(--fg); font-weight: 500; }
  .card h3 .ip { color: var(--mute); font-size: 11px; font-weight: 400; }
  .tag { display: inline-block; padding: 1px 7px; border-radius: 99px; font-size: 10px; letter-spacing: 0.12em; font-weight: 600; }
  .tag.ok { background: rgba(123,229,123,0.10); color: var(--green); border: 1px solid rgba(123,229,123,0.30); }
  .tag.no { background: rgba(255,74,61,0.10); color: var(--red); border: 1px solid rgba(255,74,61,0.30); }
  .tag.muted { background: #1a1a1a; color: var(--mute); border: 1px solid var(--line); }
  .tag.warn { background: rgba(255,178,74,0.10); color: var(--warn); border: 1px solid rgba(255,178,74,0.30); }
  .stats { display: flex; gap: 16px; font-size: 11px; color: var(--mute); letter-spacing: 0.10em; text-transform: uppercase; }
  .stats b { color: var(--fg); font-weight: 600; font-variant-numeric: tabular-nums; }
  .row { display: flex; flex-direction: column; gap: 6px; }
  .row .label { font-size: 10px; letter-spacing: 0.26em; color: var(--mute); text-transform: uppercase; }
  textarea.prompt {
    background: #0b0b0b; border: 1px solid var(--line); color: var(--fg);
    padding: 10px 12px; border-radius: 6px; font-family: inherit; font-size: 12px;
    min-height: 80px; resize: vertical; line-height: 1.5;
  }
  textarea.prompt:focus { outline: 1px solid var(--accent); border-color: var(--accent); }
  .cadence-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .cadence-row input[type=number] { width: 80px; background: #0b0b0b; border: 1px solid var(--line); color: var(--fg); padding: 6px 8px; border-radius: 4px; font-family: inherit; font-size: 12px; }
  .cadence-row select { background: #0b0b0b; border: 1px solid var(--line); color: var(--fg); padding: 6px 8px; border-radius: 4px; font-family: inherit; font-size: 12px; }
  .cadence-row .actual { font-size: 11px; color: var(--mute); }
  .cadence-row .actual.mismatch { color: var(--warn); }
  button.save {
    background: var(--accent); color: #000; border: 0; padding: 6px 14px;
    border-radius: 4px; font-family: inherit; font-size: 11px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer;
  }
  button.save:hover { filter: brightness(1.1); }
  button.save:disabled { opacity: 0.4; cursor: not-allowed; }
  button.use-suggested {
    background: transparent; color: var(--accent); border: 1px solid var(--accent);
    padding: 4px 10px; border-radius: 4px; font-family: inherit; font-size: 10px;
    font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer;
  }
  button.use-suggested:hover { background: rgba(230,196,73,0.10); }
  .save-status { font-size: 11px; color: var(--mute); margin-left: 8px; }
  .save-status.ok { color: var(--green); }
  .save-status.err { color: var(--red); }
  .products { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  @media (max-width: 520px) { .products { grid-template-columns: repeat(2, 1fr); } }
  .product {
    background: #0b0b0b; border: 1px solid var(--line); border-radius: 6px;
    aspect-ratio: 1 / 1; overflow: hidden; position: relative; display: block;
  }
  .product img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .product .empty { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--mute); font-size: 10px; letter-spacing: 0.2em; }
  .product .sold { position: absolute; top: 4px; right: 4px; font-size: 9px; color: var(--mute); background: rgba(0,0,0,0.6); padding: 1px 4px; border-radius: 2px; }
  .product .pid { position: absolute; bottom: 4px; left: 4px; font-size: 9px; color: var(--fg); background: rgba(0,0,0,0.6); padding: 1px 4px; border-radius: 2px; }
  .links { font-size: 11px; color: var(--mute); display: flex; gap: 12px; flex-wrap: wrap; }
  .err { color: var(--red); padding: 20px; text-align: center; }
  .loading { color: var(--mute); padding: 40px; text-align: center; letter-spacing: 0.2em; }
  .muted { color: var(--mute); }
  .empty-state { color: var(--mute); padding: 30px; text-align: center; font-style: italic; }
</style>
</head>
<body>
<header>
  <h1>━◯━ MU · COLLAB DASHBOARD</h1>
  <div class="meta">
    <span id="snapshot">loading…</span> · <a href="/admin">← /admin</a>
  </div>
</header>

<div class="wrap">
  <div class="toolbar">
    <label>filter</label>
    <input type="text" id="filter" placeholder="slug / name / ip_owner…" oninput="render()">
    <label><input type="checkbox" id="approved_only" onchange="reload()"> approved only</label>
    <label><input type="checkbox" id="hide_personal" onchange="reload()"> hide personal-*</label>
    <label>sort</label>
    <select id="sort" onchange="render()">
      <option value="recent">approval date ↓</option>
      <option value="skus">SKU count ↓</option>
      <option value="active">active products ↓</option>
      <option value="slug">slug A→Z</option>
    </select>
    <span id="count" class="muted" style="margin-left:auto"></span>
  </div>
  <div id="content"><div class="loading">━◯━ loading...</div></div>
</div>

<script>
const url = new URL(window.location.href);
const TOK = url.searchParams.get('admin_token') || url.searchParams.get('token') || '';
let DATA = null;

function qs(extra) {
  const p = new URLSearchParams();
  if (TOK) p.set('admin_token', TOK);
  for (const [k, v] of Object.entries(extra || {})) p.set(k, v);
  return '?' + p.toString();
}

async function reload() {
  const approved = document.getElementById('approved_only').checked ? '1' : '';
  const hidep = document.getElementById('hide_personal').checked ? '0' : '1';
  const extra = { include_personal: hidep };
  if (approved) extra.approved = '1';
  const r = await fetch('/api/admin/collabs/dashboard' + qs(extra), { credentials: 'include' });
  if (r.status === 401 || r.status === 403) {
    document.getElementById('content').innerHTML =
      `<div class="err">HTTP ${r.status} — admin_token を URL に付けて再アクセス: <code>/admin/collabs?admin_token=…</code></div>`;
    return;
  }
  if (!r.ok) {
    document.getElementById('content').innerHTML = `<div class="err">HTTP ${r.status} — load failed</div>`;
    return;
  }
  DATA = await r.json();
  document.getElementById('snapshot').textContent = `${DATA.total} collabs`;
  render();
}

function render() {
  if (!DATA) return;
  const filter = document.getElementById('filter').value.toLowerCase().trim();
  const sort = document.getElementById('sort').value;
  let list = (DATA.collabs || []).filter(c => {
    if (!filter) return true;
    return (c.slug + ' ' + c.name + ' ' + c.ip_owner).toLowerCase().includes(filter);
  });
  if (sort === 'skus') list.sort((a, b) => b.sku_count - a.sku_count);
  else if (sort === 'active') list.sort((a, b) => b.products_active - a.products_active);
  else if (sort === 'slug') list.sort((a, b) => a.slug.localeCompare(b.slug));
  // 'recent' uses API order (approved_at DESC)
  document.getElementById('count').textContent = `${list.length} shown / ${DATA.total} total`;
  if (!list.length) {
    document.getElementById('content').innerHTML = `<div class="empty-state">no collabs match</div>`;
    return;
  }
  const html = `<div class="grid">${list.map(cardHtml).join('')}</div>`;
  document.getElementById('content').innerHTML = html;
}

function cardHtml(c) {
  const safe = s => (s == null ? '' : String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;'));
  const statusTag = c.revoked_at
    ? '<span class="tag no">revoked</span>'
    : (c.approved_at ? '<span class="tag ok">approved</span>' : '<span class="tag muted">draft</span>');
  const personalTag = c.slug.startsWith('personal-')
    ? '<span class="tag muted">personal</span>' : '';
  const promptVal = c.ai_prompt || '';
  const placeholder = c.ai_prompt_suggested || '';
  const cadence = c.cadence_hours || 24;
  const cadenceLabel = c.cadence_label || 'every 24h';
  // Cron-actual: 0 = no scheduled cron; otherwise compare to admin cadence.
  let actualHtml = '';
  if (c.cron_actual_hours > 0) {
    const mismatch = c.cron_actual_hours !== cadence;
    actualHtml = `<span class="actual ${mismatch ? 'mismatch' : ''}">cron actual: ${c.cron_actual_label} (${c.cron_actual_hours}h)${mismatch ? ' ⚠️ admin と不一致' : ' ✓'}</span>`;
  } else {
    actualHtml = `<span class="actual">cron: ${safe(c.cron_actual_label)}</span>`;
  }
  const samples = (c.product_samples || []);
  let productsHtml;
  if (!samples.length) {
    productsHtml = `<div class="empty-state" style="padding:14px">商品 0 件 — まだ生成されていません</div>`;
  } else {
    const FALLBACK_IMG = 'https://mockups.wearmu.com/hero.png';
    const cells = samples.slice(0, 8).map(p => {
      // Try mockup → design → lifestyle in order; final fallback is the brand
      // hero so /admin/collabs is never empty. onerror cycles through each
      // candidate URL once before settling on the brand mark.
      const candidates = [p.mockup_url, p.design_url, p.lifestyle_url, FALLBACK_IMG]
        .filter(Boolean);
      const primary = candidates[0];
      const fallbacks = candidates.slice(1).concat(FALLBACK_IMG);
      const onerr = `this.dataset.i=(parseInt(this.dataset.i||'0',10)+1);` +
        `var f=${JSON.stringify(fallbacks)};` +
        `if(this.dataset.i<f.length){this.src=f[this.dataset.i-1];}else{this.onerror=null;}`;
      const inner = `<img src="${safe(primary)}" alt="${safe(p.name)}" loading="lazy" onerror="${onerr.replace(/"/g,'&quot;')}">`;
      const sold = p.sold > 0 ? `<span class="sold">${p.sold} sold</span>` : '';
      return `<a class="product" href="/buy/${p.id}" target="_blank" title="${safe(p.name)} (#${p.id})">
        ${inner}
        <span class="pid">#${p.id}</span>
        ${sold}
      </a>`;
    }).join('');
    productsHtml = `<div class="products">${cells}</div>`;
  }
  // Show last 8; total reference is sku_count + products_total.
  return `
  <div class="card" data-slug="${safe(c.slug)}">
    <h3>
      <span class="slug">${safe(c.slug)}</span>
      <span class="name">${safe(c.name)}</span>
      <span class="ip">— ${safe(c.ip_owner)}</span>
      ${statusTag}
      ${personalTag}
    </h3>
    <div class="stats">
      <span>SKU <b>${c.sku_count}</b></span>
      <span>active <b>${c.products_active}</b></span>
      <span>total <b>${c.products_total}</b></span>
      ${c.approved_at ? `<span class="muted">approved ${safe(c.approved_at).slice(0,10)}</span>` : ''}
    </div>

    <div class="row">
      <div class="label">AI prompt (design 生成テンプレート)</div>
      <textarea class="prompt" id="prompt-${safe(c.slug)}" placeholder="${safe(placeholder)}">${safe(promptVal)}</textarea>
      <div>
        <button class="use-suggested" onclick="useSuggested('${safe(c.slug)}', ${JSON.stringify(placeholder)})">推奨テンプレートを差し込む</button>
        <button class="save" onclick="savePrompt('${safe(c.slug)}')">prompt 保存</button>
        <span class="save-status" id="prompt-status-${safe(c.slug)}"></span>
      </div>
    </div>

    <div class="row">
      <div class="label">作る期間 (cadence)</div>
      <div class="cadence-row">
        <input type="number" id="cad-h-${safe(c.slug)}" value="${cadence}" min="1" max="8760">
        <span class="muted">時間に 1 枚</span>
        <select id="cad-l-${safe(c.slug)}">
          <option value="every 1h"${cadenceLabel==='every 1h'?' selected':''}>every 1h</option>
          <option value="every 6h"${cadenceLabel==='every 6h'?' selected':''}>every 6h</option>
          <option value="every 24h"${cadenceLabel==='every 24h'?' selected':''}>every 24h (default)</option>
          <option value="weekly"${cadenceLabel==='weekly'?' selected':''}>weekly</option>
          <option value="monthly"${cadenceLabel==='monthly'?' selected':''}>monthly</option>
          <option value="manual"${cadenceLabel==='manual'?' selected':''}>manual</option>
          <option value="${safe(cadenceLabel)}"${!['every 1h','every 6h','every 24h','weekly','monthly','manual'].includes(cadenceLabel)?' selected':''}>${safe(cadenceLabel)}</option>
        </select>
        <button class="save" onclick="saveCadence('${safe(c.slug)}')">cadence 保存</button>
        <span class="save-status" id="cad-status-${safe(c.slug)}"></span>
      </div>
      <div class="cadence-row">${actualHtml}</div>
    </div>

    <div class="row">
      <div class="label">最近の商品 (latest 8)</div>
      ${productsHtml}
    </div>

    <div class="links">
      <a href="/admin/proposals/${safe(c.slug)}/manage?admin_token=${encodeURIComponent(TOK)}">manage SKUs</a>
      <a href="/${safe(c.slug)}" target="_blank">public LP →</a>
      <a href="/admin/products?token=${encodeURIComponent(TOK)}&brand=${encodeURIComponent(c.slug)}" target="_blank">products filter</a>
    </div>
  </div>`;
}

function useSuggested(slug, suggested) {
  const el = document.getElementById('prompt-' + slug);
  if (!el) return;
  if (el.value && !confirm('現在の prompt を上書きしますか?')) return;
  el.value = suggested || '';
}

async function savePrompt(slug) {
  const el = document.getElementById('prompt-' + slug);
  const status = document.getElementById('prompt-status-' + slug);
  if (!el) return;
  const val = el.value.trim();
  status.textContent = '保存中…'; status.className = 'save-status';
  try {
    const r = await fetch('/api/admin/proposal/' + encodeURIComponent(slug) + '/meta' + qs({}), {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ ai_prompt: val }),
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    status.textContent = '✓ saved'; status.className = 'save-status ok';
    setTimeout(() => { status.textContent = ''; }, 3000);
  } catch (e) {
    status.textContent = '✗ ' + e.message; status.className = 'save-status err';
  }
}

async function saveCadence(slug) {
  const h = parseInt(document.getElementById('cad-h-' + slug).value, 10);
  const label = document.getElementById('cad-l-' + slug).value;
  const status = document.getElementById('cad-status-' + slug);
  if (!h || h < 1 || h > 8760) { status.textContent = '✗ 1-8760 の範囲で入力'; status.className = 'save-status err'; return; }
  status.textContent = '保存中…'; status.className = 'save-status';
  try {
    const r = await fetch('/api/admin/proposal/' + encodeURIComponent(slug) + '/meta' + qs({}), {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ cadence_hours: h, cadence_label: label }),
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    status.textContent = '✓ saved'; status.className = 'save-status ok';
    setTimeout(() => { status.textContent = ''; }, 3000);
  } catch (e) {
    status.textContent = '✗ ' + e.message; status.className = 'save-status err';
  }
}

reload();
</script>
</body>
</html>
