<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MU Collabs — 全コラボ一覧</title>
<meta name="description" content="MU と一緒に「無」を着る形にした全ブランドの一覧。利益の50%は寄付、月相で SKU が静かに切り替わる。">
<meta property="og:type" content="website">
<meta property="og:title" content="MU Collabs — 全コラボ一覧">
<meta property="og:description" content="MU と一緒に「無」を着る形にした全ブランドの一覧。利益の50%は寄付、月相で SKU が静かに切り替わる。">
<meta property="og:image" content="/og.jpg">
<meta property="og:url" content="https://wearmu.com/proposals">
<meta property="og:site_name" content="MU">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="MU Collabs — 全コラボ一覧">
<meta name="twitter:description" content="MU と一緒に「無」を着る形にした全ブランドの一覧。">
<meta name="twitter:image" content="/og.jpg">
<link rel="canonical" href="https://wearmu.com/proposals">
<style>
:root{
  --bg:#070707; --bg-2:#0d0d0d; --bg-3:#161616;
  --fg:#F5F5F0; --mute:rgba(245,245,240,0.62); --line:rgba(255,255,255,0.10);
  --y:#e6c449; --y-soft:rgba(230,196,73,0.10);
  --g:#4FA868; --r:#d96565;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--fg);
  font-family:'Helvetica Neue','Hiragino Mincho ProN','Yu Mincho',Arial,sans-serif;
  line-height:1.85;-webkit-font-smoothing:antialiased;font-feature-settings:"palt";
}
a{color:inherit;text-decoration:none}

.cover{padding:96px 28px 56px;text-align:center;border-bottom:1px solid var(--line)}
.cover .mark{font-size:64px;color:var(--y);margin-bottom:14px;line-height:1;font-family:'Hiragino Mincho ProN',serif}
.cover .kicker{font-size:11px;letter-spacing:0.32em;text-transform:uppercase;color:var(--mute);margin-bottom:16px}
.cover h1{font-size:clamp(30px,5.4vw,52px);font-weight:200;letter-spacing:0.02em;line-height:1.18;font-family:'Hiragino Mincho ProN','Yu Mincho',serif;margin-bottom:14px}
.cover h1 em{color:var(--y);font-style:normal}
.cover .lede{font-size:14px;color:var(--mute);letter-spacing:0.06em;max-width:640px;margin:0 auto 22px;line-height:1.95}
.cover .meta{font-size:11px;color:var(--mute);letter-spacing:0.18em;text-transform:uppercase}
.cover .meta b{color:var(--y);font-weight:500}

section{padding:48px 28px;max-width:1080px;margin:0 auto}
section h2{font-size:clamp(20px,2.6vw,26px);font-weight:300;text-align:center;margin-bottom:8px;letter-spacing:0.04em}
section h2 em{color:var(--y);font-style:normal}
section .lede{font-size:13px;color:var(--mute);text-align:center;max-width:600px;margin:0 auto 28px;letter-spacing:0.06em}

.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;max-width:1080px;margin:0 auto 22px;padding:0 28px}
.toolbar .group{display:flex;gap:8px;flex-wrap:wrap}
.toolbar button{background:var(--bg-2);border:1px solid var(--line);color:var(--fg);font-family:inherit;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;padding:8px 14px;cursor:pointer;transition:all .15s}
.toolbar button:hover{border-color:var(--y);color:var(--y)}
.toolbar button.on{background:var(--y);color:#070707;border-color:var(--y)}
.toolbar .summary{font-size:11px;color:var(--mute);letter-spacing:0.18em;text-transform:uppercase}
.toolbar .summary b{color:var(--y);font-weight:500;font-variant-numeric:tabular-nums}

.admin-bar{display:none;background:var(--y-soft);border:1px solid var(--y);max-width:1080px;margin:0 auto 18px;padding:10px 16px;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--y);text-align:center}
.admin-bar.on{display:block}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;max-width:1080px;margin:0 auto;padding:0 28px}
.card{background:var(--bg-2);border:1px solid var(--line);padding:22px 22px 20px;display:flex;flex-direction:column;transition:border-color .15s,transform .15s}
.card:hover{border-color:var(--y);transform:translateY(-2px)}
.card .row1{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}
.card .slug{font-size:11px;color:var(--y);letter-spacing:0.22em;text-transform:uppercase;font-family:'Menlo','SF Mono',monospace}
.card .badges{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.card .badge{font-size:9px;letter-spacing:0.18em;padding:2px 8px;border:1px solid currentColor;border-radius:2px;text-transform:uppercase;font-weight:500}
.card .badge.live{color:var(--g)}
.card .badge.draft{color:var(--y)}
.card .badge.gone{color:var(--r)}
.card .name{font-size:18px;color:var(--fg);font-weight:300;line-height:1.35;margin-bottom:8px;font-family:'Hiragino Mincho ProN','Yu Mincho',serif;min-height:50px}
.card .ip{font-size:11.5px;color:var(--mute);letter-spacing:0.06em;line-height:1.6;margin-bottom:14px}
.card .ip b{color:var(--fg);font-weight:400}
.card .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;border-top:1px solid var(--line);padding-top:14px}
.card .stats .s{text-align:left}
.card .stats .s b{display:block;color:var(--y);font-size:20px;font-weight:500;font-variant-numeric:tabular-nums;line-height:1.1;margin-bottom:3px}
.card .stats .s .lb{font-size:9.5px;color:var(--mute);letter-spacing:0.16em;text-transform:uppercase}
.card .links{display:flex;gap:8px;margin-top:auto;flex-wrap:wrap}
.card .links a{flex:1;text-align:center;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;padding:8px 10px;border:1px solid var(--line);color:var(--mute);transition:all .15s;min-width:80px}
.card .links a:hover{border-color:var(--y);color:var(--y)}
.card .links a.primary{border-color:var(--y);color:var(--y);background:var(--y-soft)}
.card .links a.primary:hover{background:var(--y);color:#070707}

.empty{text-align:center;padding:60px 28px;color:var(--mute);font-size:13px;letter-spacing:0.12em}
.empty.error{color:var(--r)}

.foot{padding:56px 28px 80px;text-align:center;border-top:1px solid var(--line);margin-top:48px}
.foot .row{font-size:11px;color:var(--mute);letter-spacing:0.18em;text-transform:uppercase;margin-bottom:12px}
.foot .row a{color:var(--y)}
.foot .copy{font-size:10px;color:var(--mute);letter-spacing:0.2em}

@media (max-width:520px){
  .grid{grid-template-columns:1fr;padding:0 20px}
  .toolbar{padding:0 20px}
  section{padding:36px 20px}
}
</style>
</head>
<body>

<div class="cover">
  <div class="mark">無</div>
  <div class="kicker">MU × Collab Directory</div>
  <h1>MU と コラボ する<br><em>全ブランド</em>。</h1>
  <p class="lede">月相で SKU が静かに切り替わる、 無在庫の Tシャツ・スウェット・トート。 利益の 50% は寄付、 残りはブランド と 着る人に分配される。</p>
  <div class="meta">
    <b id="ct-total">·</b> brands · <b id="ct-skus">·</b> skus · <b id="ct-active">·</b> live
  </div>
</div>

<div class="admin-bar" id="adminBar">
  Admin mode — draft / personal も表示中
</div>

<div class="toolbar">
  <div class="group" id="filter">
    <button class="on" data-f="all">All</button>
    <button data-f="live">Live</button>
    <button data-f="draft" id="btnDraft" style="display:none">Draft</button>
  </div>
  <div class="group" id="sort">
    <button class="on" data-s="approved">最新の承認順</button>
    <button data-s="sku">SKU 数</button>
    <button data-s="name">名前順</button>
  </div>
  <div class="summary"><b id="shown">0</b> / <b id="total">0</b> brands</div>
</div>

<div id="grid" class="grid"></div>
<div id="empty" class="empty" style="display:none">読み込み中…</div>

<div class="foot">
  <div class="row">
    <a href="/collab">/collab</a> · <a href="/protocol">/protocol</a> · <a href="/profit-split">/profit-split</a>
  </div>
  <div class="copy">© MU — 月で無を着る。</div>
</div>

<script>
(function(){
  const $ = (id) => document.getElementById(id);
  const gridEl = $('grid');
  const emptyEl = $('empty');
  const params = new URLSearchParams(location.search);
  const adminToken = params.get('admin_token') || params.get('token');
  const isAdmin = !!adminToken;

  let state = { filter: 'all', sort: 'approved', data: [] };

  if (isAdmin) {
    $('adminBar').classList.add('on');
    $('btnDraft').style.display = '';
  }

  function badges(p) {
    const live = p.approved_at && !p.revoked_at;
    const revoked = !!p.revoked_at;
    if (revoked) return '<span class="badge gone">revoked</span>';
    if (live) return '<span class="badge live">live</span>';
    return '<span class="badge draft">draft</span>';
  }

  function isPersonal(p) {
    const owner = (p.ip_owner || '').trim();
    if (owner.toLowerCase().startsWith('personal')) return true;
    if ((p.slug || '').startsWith('personal-')) return true;
    return false;
  }

  function ownerLine(p) {
    const owner = (p.ip_owner || '').trim();
    if (!owner) return '';
    // Defense in depth — never expose email-like strings on the public list.
    if (!isAdmin && /[@<>]/.test(owner)) return '';
    return owner.length > 64 ? owner.slice(0, 62) + '…' : owner;
  }

  function card(p) {
    const live = p.approved_at && !p.revoked_at;
    const name = (p.name || p.slug || '').replace(/</g, '&lt;');
    const slug = (p.slug || '').replace(/</g, '&lt;');
    const owner = ownerLine(p).replace(/</g, '&lt;');
    const sku = p.sku_count || 0;
    const active = p.products_active || 0;
    const ownerHtml = owner ? `<div class="ip"><b>IP:</b> ${owner}</div>` : '';
    const links = [
      live
        ? `<a class="primary" href="/${encodeURIComponent(slug)}">View →</a>`
        : (isAdmin
            ? `<a class="primary" href="/${encodeURIComponent(slug)}?admin_token=${encodeURIComponent(adminToken)}">Preview</a>`
            : `<a class="primary" href="/${encodeURIComponent(slug)}" style="opacity:.5;pointer-events:none">非公開</a>`),
    ];
    if (isAdmin) {
      links.push(`<a href="/admin/proposals/${encodeURIComponent(slug)}/manage?token=${encodeURIComponent(adminToken)}">Manage</a>`);
    }
    return `<div class="card">
      <div class="row1">
        <div class="slug">${slug}</div>
        <div class="badges">${badges(p)}</div>
      </div>
      <div class="name">${name}</div>
      ${ownerHtml}
      <div class="stats">
        <div class="s"><b>${sku}</b><span class="lb">SKUs</span></div>
        <div class="s"><b>${active}</b><span class="lb">Active</span></div>
      </div>
      <div class="links">${links.join('')}</div>
    </div>`;
  }

  function applyFilter(list) {
    let out = list.slice();
    if (state.filter === 'live') out = out.filter(p => p.approved_at && !p.revoked_at);
    if (state.filter === 'draft') out = out.filter(p => !p.approved_at || p.revoked_at);
    if (state.sort === 'sku') out.sort((a,b) => (b.sku_count||0) - (a.sku_count||0));
    else if (state.sort === 'name') out.sort((a,b) => (a.name||a.slug||'').localeCompare(b.name||b.slug||'', 'ja'));
    else out.sort((a,b) => (b.approved_at||'').localeCompare(a.approved_at||''));
    return out;
  }

  function render() {
    const filtered = applyFilter(state.data);
    if (!filtered.length) {
      gridEl.innerHTML = '';
      emptyEl.style.display = 'block';
      emptyEl.textContent = state.data.length ? '該当 0 件' : '読み込み中…';
    } else {
      emptyEl.style.display = 'none';
      gridEl.innerHTML = filtered.map(card).join('');
    }
    $('shown').textContent = filtered.length;
    $('total').textContent = state.data.length;
    $('ct-total').textContent = state.data.filter(p => !isPersonal(p)).length;
    $('ct-skus').textContent = state.data.reduce((s,p) => s + (p.sku_count||0), 0);
    $('ct-active').textContent = state.data.filter(p => p.approved_at && !p.revoked_at).length;
  }

  function wireButtons(groupId, key) {
    const root = $(groupId);
    root.addEventListener('click', (e) => {
      const b = e.target.closest('button'); if (!b) return;
      [...root.querySelectorAll('button')].forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      state[key] = b.dataset[key === 'filter' ? 'f' : 's'];
      render();
    });
  }
  wireButtons('filter', 'filter');
  wireButtons('sort', 'sort');

  async function load() {
    try {
      let resp, data;
      if (isAdmin) {
        resp = await fetch('/admin/proposals?token=' + encodeURIComponent(adminToken), {
          headers: { 'Authorization': 'Bearer ' + adminToken, 'Accept': 'application/json' },
          credentials: 'omit',
        });
      } else {
        resp = await fetch('/api/proposals', { headers: { 'Accept': 'application/json' }, credentials: 'omit' });
      }
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      data = await resp.json();
      let list = (data.proposals || []);
      // Public defense in depth: never render personal-* or owner LIKE 'Personal%' even if server didn't filter.
      if (!isAdmin) {
        list = list.filter(p => !isPersonal(p));
        list = list.filter(p => p.approved_at && !p.revoked_at);
      }
      state.data = list;
      render();
    } catch (err) {
      emptyEl.className = 'empty error';
      emptyEl.textContent = '読み込みに失敗しました (' + err.message + ')';
      emptyEl.style.display = 'block';
    }
  }

  load();
})();
</script>

</body>
</html>
