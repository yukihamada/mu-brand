<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- MU iconic mark: ━◯━ (line + zero + line)
       The 0 = "0 humans". The lines = the hourly timeline.
       Negative space in the middle = 間 (MA). -->
  <rect width="32" height="32" fill="#0A0A0A"/>
  <rect x="2" y="15" width="8" height="2" fill="#F5F5F0"/>
  <circle cx="16" cy="16" r="4.5" stroke="#F5F5F0" stroke-width="2" fill="none"/>
  <rect x="22" y="15" width="8" height="2" fill="#F5F5F0"/>
</svg>
