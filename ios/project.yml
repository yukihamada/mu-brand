name: MU
options:
  bundleIdPrefix: com.wearmu
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: ja
settings:
  base:
    DEVELOPMENT_TEAM: 5BV85JW8US
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "1.0.0"
targets:
  MU:
    type: application
    platform: iOS
    sources:
      - MU/Sources
      - MU/Resources
    dependencies:
      - target: MUWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wearmu.mu
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: MU
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "商品タグやムーンマーカーのQRコードを読み取り、真贋・音・つくる画面を開くために使います。"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "「声で作る」で、話した言葉からデザインを生成するために使います。"
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "話した言葉を文字に変換して、作りたいものを入力するために使います。"
  MUWidget:
    type: app-extension
    platform: iOS
    sources:
      - MUWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wearmu.mu.widget
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: MUWidget/Info.plist
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
